/* ═══════════════════════════════════════════════
   MAIN APP — نظام السجل التراكمي (Append-only Ledger)
   • السجل (ledger) هو المصدر الوحيد للحقيقة
   • كل الأرصدة والديون تُشتقّ بجمع القيود
   • لا حذف — الإلغاء يكون بقيد عكسي (reversal)
═══════════════════════════════════════════════ */

/* بناء قيد ثابت */
function makeEntry(p){
  return {
    id:        p.id || `J-${Date.now()}-${Math.random().toString(36).slice(2,8)}`,
    ts:        p.ts != null ? p.ts : Date.now(),
    date:      p.date || getTodayDateString(),
    type:      p.type || 'misc',
    actType:   p.actType || p.type || 'misc',
    customer:  p.customer || null,
    customerId:p.customerId || null,
    party:     p.party || null,
    dinar:     p.dinar || 0,        /* تغيّر صوارد الكوفر (+/-) */
    gold:      p.gold || 0,         /* تغيّر باقي اللانقو 24 (+/-) */
    debtDinar: p.debtDinar || 0,    /* تغيّر دين الزبون (دينار) */
    debtGold:  p.debtGold || 0,     /* تغيّر دين الزبون (ذهب) */
    desc:      p.desc || '',
    note:      p.note || '',
    diffGold:  p.diffGold != null ? p.diffGold : undefined,   /* فرق الذهب بإشارته (للتصحيح) */
    diffDinar: p.diffDinar != null ? p.diffDinar : undefined, /* فرق الدينار بإشارته (للتصحيح) */
    restoreBar: p.restoreBar || undefined,   /* بيانات السبيكة لإعادتها عند إلغاء السلف */
    amount:    p.amount != null ? p.amount : undefined,
    refId:     p.refId || null,
    reverses:  p.reverses || null,
    reversed:  p.reversed || false,
  };
}

/* ترحيل البيانات القديمة (قبل نظام السجل) إلى قيود */
function migrateLegacy(local){
  if(!local) return [];
  const hasLegacy =
    (local.dinarCofferTotal||0)!==0 || (local.extraLingotBalance||0)!==0 ||
    (local.debtsList && local.debtsList.length) ||
    (local.recentActivities && local.recentActivities.length) ||
    local.openingDone ||
    (local.invoices && local.invoices.length) ||
    (local.lingotsInCoffer && local.lingotsInCoffer.length);
  if(!hasLegacy) return [];
  const out=[]; const t0=Date.now();
  /* قيد ترحيل الأرصدة الصافية */
  out.push(makeEntry({ id:`J-SEED-${t0}`, ts:t0-1, type:'migrate', actType:'take', party:'النظام',
    dinar: local.dinarCofferTotal||0, gold: local.extraLingotBalance||0,
    desc:'ترحيل رصيد سابق إلى نظام السجل التراكمي', amount: local.dinarCofferTotal||0 }));
  /* قيود ترحيل الديون */
  (local.debtsList||[]).forEach((d,i)=>{
    if((d.amount||0)===0 && (d.gold||0)===0) return;
    out.push(makeEntry({ id:`J-SEEDDEBT-${t0}-${i}`, ts:t0-1, type:'migrate-debt', actType:'take',
      customer:d.name, debtDinar:d.amount||0, debtGold:d.gold||0,
      desc:`ترحيل دين سابق: ${d.name}`, amount:Math.abs(d.amount||0) }));
  });
  if(local.openingDone) out.push(makeEntry({ id:`J-SEEDOPEN-${t0}`, ts:t0-1, type:'opening',
    actType:'take', party:'النظام', desc:'الرصيد الافتتاحي (مُرحّل)', amount:0 }));
  /* السجل التاريخي القديم (للعرض فقط — بدون أثر على الأرصدة لأنها رُحّلت كصافٍ) */
  (local.recentActivities||[]).forEach((a,i)=>{
    out.push(makeEntry({ id:`J-HIST-${t0}-${i}`, ts:(t0-1000)-i, type:a.type, actType:a.type,
      customer:(a.name && a.name!=='النظام')?a.name:null,
      party:(a.name==='النظام')?'النظام':null,
      desc:a.desc, amount:a.amount, date:a.date }));
  });
  return out;
}

const _round6 = n => Math.round((n + Number.EPSILON) * 1e6) / 1e6;

function RafinageApp(){
  const _localDB = useMemo(loadDB, []);

  /* ── حالة الاتصال ── */
  const [fbStatus, setFbStatus] = useState('connecting');
  const [fbLoaded, setFbLoaded] = useState(false);

  const [dark, setDark] = useState(_localDB.dark ?? false);
  const t = useMemo(() => makeTheme(dark), [dark]);
  const [activeTab, setActiveTab] = useState('home');
  const [decoy, setDecoy] = useState(false);
  const _spaceTimes = useRef([]);

  /* ── السجل التراكمي = مصدر الحقيقة ── */
  const [ledger, setLedger] = useState(() =>
    (Array.isArray(_localDB.ledger) && _localDB.ledger.length)
      ? _localDB.ledger
      : migrateLegacy(_localDB)
  );

  /* ── المخزون والمستندات (كيانات بمعرّفات — لا تنجرف) ── */
  const [lingotsInCoffer,   setLingotsInCoffer]   = useState(_localDB.lingotsInCoffer   ?? []);
  const [workshop1Lingots,  setWorkshop1Lingots]  = useState(_localDB.workshop1Lingots  ?? []);
  const [workshop2Lingots,  setWorkshop2Lingots]  = useState(_localDB.workshop2Lingots  ?? []);
  const [workshop1Sessions, setWorkshop1Sessions] = useState(_localDB.workshop1Sessions ?? []);
  const [workshop2Sessions, setWorkshop2Sessions] = useState(_localDB.workshop2Sessions ?? []);
  const [invoices,          setInvoices]          = useState(_localDB.invoices          ?? []);

  /* ── المستخدم الحالي + بيانات العامل المنفصلة ── */
  const [session, setSession] = useState(AUTH.enabled ? null : loadSession());
  const [authResolved, setAuthResolved] = useState(!AUTH.enabled);
  const [custData, setCustData] = useState({ invoices: [], ledger: [] });
  const [editingInvoice, setEditingInvoice] = useState(null);
  const [isMobile, setIsMobile] = useState(() => typeof window !== 'undefined' && window.innerWidth < 640);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 640);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const [showResetModal, setShowResetModal] = useState(false);
  const [workerTab, setWorkerTab] = useState('workshop');
  const [worker1Lingots,  setWorker1Lingots]  = useState(_localDB.worker1Lingots  ?? []);
  const [worker2Lingots,  setWorker2Lingots]  = useState(_localDB.worker2Lingots  ?? []);
  const [worker1Sessions, setWorker1Sessions] = useState(_localDB.worker1Sessions ?? []);
  const [worker2Sessions, setWorker2Sessions] = useState(_localDB.worker2Sessions ?? []);
  const [mismatchIds, setMismatchIds] = useState({ workshop1: [], workshop2: [] });
  const [customerAuth, setCustomerAuth] = useState(_localDB.customerAuth ?? []);
  const customerAuthRef = useRef(customerAuth);
  customerAuthRef.current = customerAuth;

  /* ── جلسة Firebase Auth (عند تفعيل المصادقة) ── */
  useEffect(() => {
    if (!AUTH.enabled) return;
    onAuthChange(user => {
      setAuthResolved(true);
      if (!user) { setSession(null); return; }
      setSession(resolveAuthSession(user, customerAuthRef.current));
    });
  }, []);

  /* ── بيانات الزبون المُصرّح بها فقط (استعلام مفلتر) ── */
  useEffect(() => {
    if (!session || session.role !== 'customer') return;
    if (AUTH.enabled && fbStatus !== 'online') return;   // انتظر جهوزية السحابة قبل الجلب
    let cancel = false;
    (async () => {
      if (AUTH.enabled) {
        const inv = await fbQueryByField('invoices', 'customerId', session.customerId) || [];
        const led = await fbQueryByField('ledger',   'customerId', session.customerId) || [];
        if (!cancel) setCustData({ invoices: inv, ledger: led.sort((a, b) => (b.ts || 0) - (a.ts || 0)) });
      }
    })();
    return () => { cancel = true; };
  }, [session, fbStatus]);

  /* دمج آمن حسب المعرّف: يبقي السحابة + أي عنصر محلي غير مرفوع (لا فقدان بيانات) */
  const _mergeById = (local, remote) => {
    const L = Array.isArray(local) ? local : [];
    const R = Array.isArray(remote) ? remote : [];
    const ids = new Set(R.map(x => x && x.id).filter(Boolean));
    const localOnly = L.filter(x => x && x.id && !ids.has(x.id));
    return [...R, ...localOnly];
  };

  /* ── مزامنة فورية (realtime) للمالك: أي تغيير على أي جهاز يظهر فوراً ── */
  const _rtSig = useRef({});
  useEffect(() => {
    if (!session || session.role === 'customer' || session.role === 'worker') return;
    if (fbStatus !== 'online') return;
    const sigOf = (arr) => arr.length + '|' + arr.map(x => (x.id || x._fbId || '') + ':' + ((x._updatedAt && x._updatedAt.seconds) || (x._createdAt && x._createdAt.seconds) || '')).join(',');
    const guard = (key, setter, transform) => (arr) => {
      const s = sigOf(arr);
      if (_rtSig.current[key] === s) return;   // لا شيء تغيّر فعلاً → لا تُعد الضبط
      _rtSig.current[key] = s;
      setter(transform ? transform(arr) : arr);
    };
    const unsubs = [
      fbSubscribe('lingots',            guard('lingots', setLingotsInCoffer, a => a.filter(l => l.weight !== undefined))),
      fbSubscribe('invoices',           guard('invoices', arr => setInvoices(prev => _mergeById(prev, arr)))),
      fbSubscribe('ledger',             guard('ledger', arr => setLedger(prev => _mergeById(prev, arr)))),
      fbSubscribe('workshop_workshop1', guard('w1', setWorkshop1Lingots)),
      fbSubscribe('workshop_workshop2', guard('w2', setWorkshop2Lingots)),
      fbSubscribe('sessions_workshop1', guard('s1', setWorkshop1Sessions)),
      fbSubscribe('sessions_workshop2', guard('s2', setWorkshop2Sessions)),
      fbSubscribe('worker_workshop1',   guard('ww1', setWorker1Lingots)),
      fbSubscribe('worker_workshop2',   guard('ww2', setWorker2Lingots)),
      fbSubscribe('customer_auth',      guard('cauth', arr => setCustomerAuth(arr.map(c=>({key:c.key||c._fbId,name:c.name,phone:c.phone,pin:c.pin}))))),
    ];
    return () => unsubs.forEach(u => { try { u && u(); } catch {} });
  }, [session, fbStatus]);

  /* ── تحديث بيانات العامل من السحابة عند كل دخول (غير متلِف — دمج لا استبدال) ── */
  useEffect(() => {
    if (!session || session.role !== 'worker') return;
    if (fbStatus !== 'online') return;   // انتظر جهوزية السحابة
    const ws = session.workshop;
    let cancel = false;
    (async () => {
      const bars = await fbGetAll(`worker_${ws}`);
      const sess = await fbGetAll(`worker_sessions_${ws}`);
      if (cancel) return;
      if (bars && bars.length) { (ws === 'workshop1' ? setWorker1Lingots : setWorker2Lingots)(prev => _mergeById(prev, bars)); }
      if (sess && sess.length) { (ws === 'workshop1' ? setWorker1Sessions : setWorker2Sessions)(prev => _mergeById(prev, sess)); }
    })();
    return () => { cancel = true; };
  }, [session, fbStatus]);

  /* ── إشعارات الدفع: تسجيل رمز الجهاز للزبون + استقبال foreground ── */
  const registerCustomerToken = async (customerId, name) => {
    try {
      if (!FCM.enabled) return;
      const ok = await fbMessagingSupported();
      if (!ok) return;
      const token = await fbGetFcmToken(FCM.vapidKey);
      if (token) await fbSet('customer_tokens', token, { customerId: String(customerId), name: name || '', ts: Date.now() });
    } catch (e) { console.warn('[FCM] token', e.message); }
  };

  const handleEnableNotifications = async () => {
    if (typeof Notification === 'undefined') { alert('جهازك لا يدعم الإشعارات.'); return; }
    if (!FCM.enabled) { alert('الإشعارات غير مفعّلة في إعداد التطبيق بعد.'); return; }
    try {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { alert('لم يتم السماح بالإشعارات على هذا الجهاز.'); return; }
      await registerCustomerToken(session.customerId, session.customerName);
      alert('✅ تم تفعيل الإشعارات على هذا الجهاز.');
    } catch (e) { alert('تعذّر تفعيل الإشعارات: ' + e.message); }
  };

  useEffect(() => {
    if (!FCM.enabled || !session || session.role !== 'customer') return;
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    registerCustomerToken(session.customerId, session.customerName);
  }, [session]);

  useEffect(() => {
    if (!FCM.enabled) return;
    try {
      fbOnForegroundMessage((payload) => {
        const d = (payload && (payload.data || (payload.notification && payload.notification))) || {};
        try {
          if (typeof Notification !== 'undefined' && Notification.permission === 'granted')
            new Notification(d.title || 'إشعار جديد', { body: d.body || '', icon: './icon-192.png' });
        } catch (e) {}
      });
    } catch (e) {}
  }, []);

  const userInteractedRef = useRef(false);

  /* ══════════════════════════════════════════════
     الأرصدة المشتقّة من السجل (Derived)
  ══════════════════════════════════════════════ */
  const dinarCofferTotal   = useMemo(() => _round6(ledger.reduce((s,e)=>s+(e.dinar||0),0)), [ledger]);
  const extraLingotBalance = useMemo(() => _round6(ledger.reduce((s,e)=>s+(e.gold||0),0)),  [ledger]);
  const openingDone        = useMemo(() => ledger.some(e=>e.type==='opening'), [ledger]);

  const debtsList = useMemo(() => {
    const map = new Map();
    for (const e of ledger){
      if (!e.customer) continue;
      const key = e.customer.trim().toLowerCase();
      const cur = map.get(key) || { name: e.customer, amount: 0, gold: 0 };
      cur.amount = _round6(cur.amount + (e.debtDinar||0));
      cur.gold   = _round6(cur.gold   + (e.debtGold||0));
      cur.name   = e.customer;
      map.set(key, cur);
    }
    return Array.from(map.values());
  }, [ledger]);

  /* قائمة المعاملات (للعرض) مشتقّة من السجل */
  const recentActivities = useMemo(() => {
    return [...ledger]
      .filter(e => e.desc)
      .sort((a,b)=>(b.ts||0)-(a.ts||0))
      .map(e => ({
        type:   e.actType || e.type,
        name:   e.customer || e.party || 'النظام',
        desc:   e.desc,
        amount: e.amount != null ? e.amount : Math.abs(e.dinar || e.gold || 0),
        date:   e.date,
        reversed: e.reversed,
        _entry: e,
      }));
  }, [ledger]);

  const lingotsTotalWeight = useMemo(
    () => lingotsInCoffer.reduce((s,l)=>s+(l.weight*l.karat)/1000,0) + extraLingotBalance,
    [lingotsInCoffer, extraLingotBalance]
  );

  /* ── تنقل لوحة المفاتيح ── */
  useEffect(() => {
    const onKey = (e) => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
        const keys = NAV.map(n => n.key);
        const cur = keys.indexOf(activeTab);
        if (e.key === 'ArrowLeft') setActiveTab(keys[(cur + 1) % keys.length]);
        else setActiveTab(keys[(cur - 1 + keys.length) % keys.length]);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeTab]);

  /* ══════════════════════════════════════════════
     FIREBASE — تحميل عند الاتصال مع حماية البيانات المحلية
  ══════════════════════════════════════════════ */
  useEffect(() => {
    onFbStatusChange((ready, err) => {
      if (ready) {
        setFbStatus('online');
        loadFromFirebase().then(data => {
          if (!data) { setFbLoaded(true); return; }

          /* ── بيانات العمّال: استرجاع/رفع مستقل (لكل عامل أرشيفه وسبائكه) ── */
          if (!userInteractedRef.current) {
            if (data.worker1Lingots  && data.worker1Lingots.length)  setWorker1Lingots(data.worker1Lingots);
            else if (worker1Lingots.length)  worker1Lingots.forEach(b => addWorkerLingot('workshop1', b));
            if (data.worker2Lingots  && data.worker2Lingots.length)  setWorker2Lingots(data.worker2Lingots);
            else if (worker2Lingots.length)  worker2Lingots.forEach(b => addWorkerLingot('workshop2', b));
            if (data.worker1Sessions && data.worker1Sessions.length) setWorker1Sessions(data.worker1Sessions);
            else if (worker1Sessions.length) worker1Sessions.forEach(s => addWorkerSession('workshop1', s));
            if (data.worker2Sessions && data.worker2Sessions.length) setWorker2Sessions(data.worker2Sessions);
            else if (worker2Sessions.length) worker2Sessions.forEach(s => addWorkerSession('workshop2', s));
            if (data.customerAuth && data.customerAuth.length) setCustomerAuth(data.customerAuth);
            else if (customerAuth.length) customerAuth.forEach(c => { const k = c.key || String(c.phone || ''); if (k) saveCustomerAuth(k, c); });
          }

          const remoteHasData =
            (data.ledger && data.ledger.length > 0) ||
            (data.invoices && data.invoices.length > 0) ||
            (data.lingotsInCoffer && data.lingotsInCoffer.length > 0);
          const localHasData =
            (ledger && ledger.length > 0) ||
            (invoices && invoices.length > 0) ||
            (lingotsInCoffer && lingotsInCoffer.length > 0);

          /* أبقِ المحلي وارفعه فقط إن كان فيه بيانات فعلاً (تفاعل، أو السحابة فارغة).
             إن كان المحلي فارغاً (بعد مسح الكاش) نطبّق السحابة دائماً حتى لو تفاعل المستخدم. */
          if (localHasData && (userInteractedRef.current || !remoteHasData)) {
            ledger.forEach(e => addLedgerEntry(e));
            setFbLoaded(true);
            return;
          }
          if (!remoteHasData) { setFbLoaded(true); return; }

          /* تطبيق بيانات المالك من السحابة — دمج لا استبدال (حماية من فقدان بيانات لم تُرفع) */
          setDark(data.dark);
          setLedger(_mergeById(ledger, data.ledger || []));
          if (data.invoices.length > 0)          setInvoices(_mergeById(invoices, data.invoices));
          if (data.lingotsInCoffer.length > 0)   setLingotsInCoffer(_mergeById(lingotsInCoffer, data.lingotsInCoffer));
          if (data.workshop1Lingots.length > 0)  setWorkshop1Lingots(_mergeById(workshop1Lingots, data.workshop1Lingots));
          if (data.workshop2Lingots.length > 0)  setWorkshop2Lingots(_mergeById(workshop2Lingots, data.workshop2Lingots));
          if (data.workshop1Sessions.length > 0) setWorkshop1Sessions(_mergeById(workshop1Sessions, data.workshop1Sessions));
          if (data.workshop2Sessions.length > 0) setWorkshop2Sessions(_mergeById(workshop2Sessions, data.workshop2Sessions));
          setFbLoaded(true);
        });
      } else {
        setFbStatus(err ? 'offline' : 'connecting');
      }
    });
  }, []);

  /* ── حفظ محلي تلقائي ── */
  useEffect(() => {
    saveDB({ ledger, lingotsInCoffer, workshop1Lingots, workshop2Lingots,
      workshop1Sessions, workshop2Sessions, invoices, dark,
      worker1Lingots, worker2Lingots, worker1Sessions, worker2Sessions, customerAuth });
  }, [ledger, lingotsInCoffer, workshop1Lingots, workshop2Lingots,
      workshop1Sessions, workshop2Sessions, invoices, dark,
      worker1Lingots, worker2Lingots, worker1Sessions, worker2Sessions, customerAuth]);

  useEffect(() => { syncSettings(dark); }, [dark]);

  /* ══════════════════════════════════════════════
     قيد جديد / قيد عكسي
  ══════════════════════════════════════════════ */
  const postEntry = (partial) => {
    const entry = makeEntry(partial);
    setLedger(p => [entry, ...p]);
    addLedgerEntry(entry);
    return entry;
  };

  const reverseEntry = (entry) => {
    if (!entry || entry.reversed) return;
    const rev = makeEntry({
      type:'reversal', actType:'reversal',
      customer: entry.customer, party: entry.party,
      dinar: -(entry.dinar||0), gold: -(entry.gold||0),
      debtDinar: -(entry.debtDinar||0), debtGold: -(entry.debtGold||0),
      desc: 'عكس: ' + (entry.desc||''),
      amount: entry.amount, reverses: entry.id, refId: entry.refId,
    });
    setLedger(p => [rev, ...p.map(e => e.id===entry.id ? { ...e, reversed:true } : e)]);
    addLedgerEntry(rev);
    addLedgerEntry({ ...entry, reversed:true });
  };

  /* ══════════════════════════════════════════════
     تصدير / استيراد
  ══════════════════════════════════════════════ */
  const importInputRef = useRef(null);

  const buildBackupPayload = () => ({ ledger, lingotsInCoffer, workshop1Lingots, workshop2Lingots,
      workshop1Sessions, workshop2Sessions, invoices, dark,
      _exportedAt: new Date().toISOString(), _version: 3 });

  const handleExportData = async () => {
    try {
      const env = await encryptJSON(buildBackupPayload());
      downloadJSONFile(JSON.stringify(env), `rafinag-backup-${getTodayDateString().replace(/\//g,'-')}.json`);
    } catch (e) { alert('⚠️ تعذّر إنشاء النسخة المشفّرة.'); }
  };

  const handleImportData = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        let d = JSON.parse(ev.target.result);
        if (d && d.__enc) { d = await decryptJSON(d); }   // نسخة مشفّرة → فكّ التشفير
        if (!confirm('⚠️ سيتم استبدال كل البيانات الحالية. هل أنت متأكد؟')) return;
        userInteractedRef.current = true;
        const newLedger = Array.isArray(d.ledger) ? d.ledger : migrateLegacy(d);
        setLedger(newLedger);
        if (Array.isArray(d.lingotsInCoffer))   setLingotsInCoffer(d.lingotsInCoffer);
        if (Array.isArray(d.workshop1Lingots))  setWorkshop1Lingots(d.workshop1Lingots);
        if (Array.isArray(d.workshop2Lingots))  setWorkshop2Lingots(d.workshop2Lingots);
        if (Array.isArray(d.workshop1Sessions)) setWorkshop1Sessions(d.workshop1Sessions);
        if (Array.isArray(d.workshop2Sessions)) setWorkshop2Sessions(d.workshop2Sessions);
        if (Array.isArray(d.invoices))          setInvoices(d.invoices);
        if (typeof d.dark === 'boolean')        setDark(d.dark);
        if (fbStatus === 'online') newLedger.forEach(en => addLedgerEntry(en));
        alert('✅ تم استعادة النسخة الاحتياطية بنجاح.');
      } catch (err) { alert('⚠️ الملف غير صالح أو تالف.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  /* ── نسخة احتياطية مشفّرة تلقائية كل ٣٠ دقيقة (للمالك) ── */
  const _backupDataRef = useRef({});
  _backupDataRef.current = { ledger, lingotsInCoffer, workshop1Lingots, workshop2Lingots,
    workshop1Sessions, workshop2Sessions, invoices, dark };
  const _lastBackupSig = useRef('');
  useEffect(() => {
    if (!session || session.role === 'customer' || session.role === 'worker') return;
    const runBackup = async () => {
      try {
        const d = _backupDataRef.current;
        const sig = `${d.ledger.length}|${d.invoices.length}|${d.lingotsInCoffer.length}|${d.workshop1Sessions.length}|${d.workshop2Sessions.length}`;
        if (sig === _lastBackupSig.current) return;     // لا تغيير → لا نسخة مكرّرة
        _lastBackupSig.current = sig;
        const env = await encryptJSON({ ...d, _exportedAt: new Date().toISOString(), _version: 3, _auto: true });
        const ts = new Date(); const pad = n => String(n).padStart(2,'0');
        const name = `rafinag-auto-${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}.json`;
        downloadJSONFile(JSON.stringify(env), name);
      } catch (e) { console.warn('[auto-backup]', e.message); }
    };
    const id = setInterval(runBackup, 30 * 60 * 1000);   // كل نصف ساعة
    return () => clearInterval(id);
  }, [session]);

  /* ── نظام الطوارئ: ٣ ضغطات مسافة → صفحة غوغل وهمية | Esc → خروج ── */
  const exitApp = () => {
    try { window.close(); } catch (e) {}
    try { window.open('', '_self'); window.close(); } catch (e) {}
    try { window.location.href = 'https://www.google.com'; } catch (e) {}
  };
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); exitApp(); return; }
      const el = e.target || {};
      const tag = (el.tagName || '').toLowerCase();
      const typing = tag === 'input' || tag === 'textarea' || tag === 'select' || el.isContentEditable;
      /* رصد ٣ مسافات متتالية — يعمل خارج حقول الكتابة، أو دائماً أثناء الصفحة الوهمية */
      if ((e.key === ' ' || e.code === 'Space') && (!typing || decoy)) {
        e.preventDefault();
        const now = Date.now();
        _spaceTimes.current = [..._spaceTimes.current.filter(t => now - t < 800), now];
        if (_spaceTimes.current.length >= 3) {
          _spaceTimes.current = [];
          setDecoy(d => !d);
        }
      }
    };
    window.addEventListener('keydown', onKey, true);
    return () => window.removeEventListener('keydown', onKey, true);
  }, [decoy]);

  /* ══════════════════════════════════════════════
     CORE LOGIC
  ══════════════════════════════════════════════ */
  const [selectedBulksToTransfer, setSelectedBulksToTransfer] = useState([]);
  const [activeReceipt, setActiveReceipt] = useState(null);

  const nextInvoiceId = useMemo(() => {
    if (invoices.length === 0) return '1';
    const ids = invoices.map(inv => { const m = inv.id.match(/\d+/); return m ? parseInt(m[0], 10) : 0; });
    return (Math.max(...ids, 0) + 1).toString();
  }, [invoices]);

  /* ── أخذ ── */
  const handleAkhadAction = (qty, type, customer, note) => {
    userInteractedRef.current = true;
    const nt = (note||'').trim();
    const suf = nt ? ` — ${nt}` : '';
    if (type === 'dinar') {
      postEntry({ type:'take', actType:'give', customer, customerId:custIdFor(customer), dinar:-qty, debtDinar:-qty, note:nt,
        desc:`أخذ — تسليم دينار لـ ${customer}: ${fmtInt(qty)} دج${suf}`, amount:qty });
    } else {
      postEntry({ type:'take-gold', actType:'give-gold', customer, customerId:custIdFor(customer), gold:-qty, debtGold:-qty, note:nt,
        desc:`أخذ — تسليم ذهب لـ ${customer}: ${fmt(qty)} غ${suf}`, amount:qty });
    }
  };

  /* ── دفع ── */
  const handleDafaaAction = (qty, type, customer, note) => {
    userInteractedRef.current = true;
    const nt = (note||'').trim();
    const suf = nt ? ` — ${nt}` : '';
    if (type === 'dinar') {
      postEntry({ type:'give', actType:'take', customer, customerId:custIdFor(customer), dinar:+qty, debtDinar:+qty, note:nt,
        desc:`دفع — استلام دينار من ${customer}: ${fmtInt(qty)} دج${suf}`, amount:qty });
    } else {
      postEntry({ type:'give-gold', actType:'take-gold', customer, customerId:custIdFor(customer), gold:+qty, debtGold:+qty, note:nt,
        desc:`دفع — استلام ذهب من ${customer}: ${fmt(qty)} غ${suf}`, amount:qty });
    }
  };

  /* ── سلف سبيكة لزبون: يخرج السبيكة من الكوفر ويسجّل صافي الـ24 ديناً ذهبياً ── */
  const handleLoanLingot = (lingotId, customerName) => {
    userInteractedRef.current = true;
    const bar = lingotsInCoffer.find(l => l.id === lingotId);
    if (!bar) return;
    const khalas = _round6((bar.weight * bar.karat) / 1000);
    /* إخراج السبيكة من الكوفر */
    deleteLingot(bar.id);
    setLingotsInCoffer(p => p.filter(l => l.id !== lingotId));
    /* تسجيل دين ذهبي على الزبون (الصافي 24) — السالب يعني على الزبون */
    postEntry({ type:'سلف', actType:'سلف', customer:customerName, customerId:custIdFor(customerName),
      debtGold:-khalas, gold:0, dinar:0,
      restoreBar:{ id:bar.id, weight:bar.weight, karat:bar.karat, source:bar.source||'' },
      desc:`سلف سبيكة ${fmt(bar.weight)}غ/${bar.karat} (صافي ${fmt(khalas)}غ) لـ ${customerName}`,
      amount:khalas, refId:bar.id });
    /* أجرة خاصة عند السلف لـ«يسين» = (الوزن × العيار ÷ 730) × 1500 — تُسجَّل له */
    if ((customerName||'').trim().replace(/\s+/g,' ') === 'يسين') {
      const loanFee = Math.round(((bar.weight * bar.karat) / 730) * 1500);
      postEntry({ type:'سلف', actType:'أجرة-سلف', customer:customerName, customerId:custIdFor(customerName),
        debtDinar:+loanFee, gold:0, dinar:0, note:`أجرة سلف`,
        desc:`أجرة سلف: ${fmt(bar.weight)}غ × ${bar.karat} ÷ 730 × 1500 = ${fmtInt(loanFee)} دج`,
        amount:loanFee, refId:bar.id });
    }
  };

  /* ── تحويل دين (ذهب/دينار) من زبون إلى آخر — يحافظ على المجموع ── */
  const handleTransferDebt = (fromName, toName, qty, type, withFee, note) => {
    userInteractedRef.current = true;
    const q = Math.abs(Number(qty) || 0);
    if (q <= 0 || !fromName || !toName) return;
    if (fromName.trim().toLowerCase() === toName.trim().toLowerCase()) { alert('⚠️ لا يمكن التحويل لنفس الزبون.'); return; }
    const nt = (note||'').trim();
    const sfx = nt ? ` — ${nt}` : '';
    const noteFrom = `تحويل إلى ${toName}${sfx}`;   // يظهر عند المُحوِّل
    const noteTo   = `تحويل من ${fromName}${sfx}`;   // يظهر عند المستلِم (من سلّمه)
    const from = debtsList.find(d => d.name.trim().toLowerCase() === fromName.trim().toLowerCase()) || { amount:0, gold:0 };
    if (type === 'gold') {
      const delta = ((from.gold || 0) < 0 ? +1 : -1) * q;  // يقلّل رصيد المُحوِّل نحو الصفر
      postEntry({ type:'تحويل', actType:'give-gold', customer:fromName, customerId:custIdFor(fromName), debtGold:+delta, note:noteFrom,
        desc:`تحويل ${fmt(q)} غ إلى ${toName}`, amount:q });
      postEntry({ type:'تحويل', actType:'take-gold', customer:toName, customerId:custIdFor(toName), debtGold:-delta, note:noteTo,
        desc:`تحويل ${fmt(q)} غ من ${fromName}`, amount:q });
      /* أجرة خاصة عند التحويل من «عبد الله شلف» أو «صلاح» — فقط إن اختير «بأجرة» */
      const _fromKey = (fromName||'').trim().replace(/\s+/g,' ');
      if (withFee && ['عبد الله شلف','صلاح'].includes(_fromKey)) {
        const feeFrom = Math.round(q * 1000);                  // أجرة المُحوِّل (له) = الوزن × 1000
        const feeTo   = Math.round((q / 0.705) * 2000);        // أجرة المستلم (عليه) = الوزن ÷ 0.705 × 2000
        /* أجرة المُحوِّل تُسجَّل لعبد الله شلف فقط — لا تُسجَّل لصلاح */
        if (_fromKey !== 'صلاح') {
          postEntry({ type:'تحويل', actType:'take', customer:fromName, customerId:custIdFor(fromName), debtDinar:+feeFrom, note:`أجرة تحويل إلى ${toName}${sfx}`,
            desc:`أجرة تحويل (له): ${fmt(q)}غ × 1000 = ${fmtInt(feeFrom)} دج`, amount:feeFrom });
        }
        /* أجرة المستلم تُسجَّل دائماً */
        postEntry({ type:'تحويل', actType:'give', customer:toName, customerId:custIdFor(toName), debtDinar:-feeTo, note:`أجرة تحويل من ${fromName}${sfx}`,
          desc:`أجرة تحويل (عليه): ${fmt(q)}غ ÷ 0.705 × 2000 = ${fmtInt(feeTo)} دج`, amount:feeTo });
      }
    } else {
      const delta = ((from.amount || 0) < 0 ? +1 : -1) * q;
      postEntry({ type:'تحويل', actType:'give', customer:fromName, customerId:custIdFor(fromName), debtDinar:+delta, note:noteFrom,
        desc:`تحويل ${fmtInt(q)} دج إلى ${toName}`, amount:q });
      postEntry({ type:'تحويل', actType:'take', customer:toName, customerId:custIdFor(toName), debtDinar:-delta, note:noteTo,
        desc:`تحويل ${fmtInt(q)} دج من ${fromName}`, amount:q });
    }
    alert(`✅ حُوّل ${type==='gold'?fmt(q)+' غ':fmtInt(q)+' دج'} من ${fromName} إلى ${toName}.`);
  };

  /* ── مصاريف ── */
  const handleDirectExpenseAction = (amount, desc) => {
    userInteractedRef.current = true;
    postEntry({ type:'expense', actType:'expense', party:desc, dinar:-amount,
      desc:`مصاريف: ${desc}`, amount });
  };

  /* ── حفظ فاتورة رافيناج ── */
  const handleSaveInvoice = (data) => {
    userInteractedRef.current = true;
    const { customer, deliverer, items, price, fee, prevDinar, prevGold, thisPayment, lingotPayment, status } = data;
    const dlvNote = deliverer ? `المسلِّم: ${deliverer}` : '';
    const netWeight     = items.reduce((s, it) => s + (it.khalas || 0), 0);
    const remaining     = prevDinar - price + thisPayment;
    const remainingGold = netWeight + prevGold - lingotPayment;
    let invId = String(data.invoiceId || nextInvoiceId);
    if (invoices.some(i => i.id === invId)) invId = nextInvoiceId;
    const today = getTodayDateString();
    const newInvoice = { id:invId, customer, customerId:custIdFor(customer), deliverer:deliverer||'', date:today, items, netWeight, price, fee, grandTotal:price,
      prevDinar, prevGold, thisPayment, lingotPayment, remaining, remainingGold, status };
    setInvoices(p => [newInvoice, ...p]); addInvoice(newInvoice);

    /* السبائك للكوفر */
    const newLingots = items.filter(it => it.weight > 0 && it.karat > 0)
      .map((it, idx) => ({ id:`L-${invId}-${idx+1}`, source:customer, weight:it.weight, karat:it.karat, date:today }));
    if (lingotPayment > 0) newLingots.push({ id:`OUT-${invId}`, source:customer, weight:-lingotPayment, karat:1000, date:today });
    setLingotsInCoffer(p => [...newLingots, ...p]); newLingots.forEach(l => addLingot(l));

    /* قيد مالي واحد يلخّص أثر الفاتورة (refId = رقم الفاتورة) */
    if (status === 'خالص') {
      postEntry({ type:'رافيناج', actType:'رافيناج', customer, customerId:custIdFor(customer), dinar:+price, gold:-netWeight, note:dlvNote,
        desc:`تصفية رافيناج: ${customer} (سند #${invId})`, amount:price, refId:invId });
    } else {
      const cur  = debtsList.find(d => d.name.trim().toLowerCase() === customer.trim().toLowerCase()) || { amount:0, gold:0 };
      const dDin = _round6(remaining     - (cur.amount || 0));
      const dGld = _round6(remainingGold - (cur.gold   || 0));
      postEntry({ type:'رافيناج', actType:'رافيناج', customer, customerId:custIdFor(customer),
        dinar:+thisPayment, gold:-lingotPayment, debtDinar:dDin, debtGold:dGld, note:dlvNote,
        desc:`تصفية رافيناج: ${customer} (سند #${invId})`, amount:price, refId:invId });
    }
    setActiveReceipt(newInvoice);
  };

  /* ── تعديل فاتورة من الأرشيف (append-only: قيد تعديل بالسبب) ── */
  const handleEditInvoice = (invId, rawItems, newPrice, reason) => {
    userInteractedRef.current = true;
    const inv = invoices.find(i => i.id === invId);
    if (!inv) return;
    const items2 = rawItems.map(it => ({
      weight: Number(it.weight) || 0,
      karat:  Number(it.karat)  || 0,
      khalas: Number((((Number(it.weight)||0) * (Number(it.karat)||0)) / 1000).toFixed(4)),
    }));
    const oldNet   = inv.netWeight || 0;
    const newNet   = _round6(items2.reduce((s, it) => s + (it.khalas || 0), 0));
    const oldPrice = inv.price || 0;
    const newPriceN= Number(newPrice) || 0;
    const dNet     = _round6(newNet - oldNet);
    const dPrice   = _round6(newPriceN - oldPrice);
    const today    = getTodayDateString();

    /* 1) تحديث الفاتورة */
    const newRemaining     = _round6((inv.prevDinar || 0) - newPriceN + (inv.thisPayment || 0));
    const newRemainingGold = _round6(newNet + (inv.prevGold || 0) - (inv.lingotPayment || 0));
    const updatedInv = { ...inv, items: items2, netWeight: newNet, price: newPriceN, grandTotal: newPriceN,
      remaining: newRemaining, remainingGold: newRemainingGold, edited: true,
      edits: [ ...(inv.edits || []), { date: today, reason, dNet, dPrice, at: Date.now() } ] };
    setInvoices(p => p.map(i => i.id === invId ? updatedInv : i));
    addInvoice(updatedInv);

    /* 2) تحديث السبيكة أينما كانت (كوفر/ورشة) عبر معرّفها */
    const upd = {};
    items2.forEach((it, idx) => { upd[`L-${invId}-${idx + 1}`] = { weight: it.weight, karat: it.karat }; });
    const fix = (l) => upd[l.id] ? { ...l, weight: upd[l.id].weight, karat: upd[l.id].karat } : l;
    setLingotsInCoffer(p => p.map(l => { if (upd[l.id]) { const nl = fix(l); addLingot(nl); return nl; } return l; }));
    setWorkshop1Lingots(p => p.map(l => { if (upd[l.id]) { const nl = fix(l); addWorkshopLingot('workshop1', nl); return nl; } return l; }));
    setWorkshop2Lingots(p => p.map(l => { if (upd[l.id]) { const nl = fix(l); addWorkshopLingot('workshop2', nl); return nl; } return l; }));

    /* 2.5) إن كانت السبيكة مُسلَّفة لزبون آخر: حدّث دين ذهبه بفرق الصافي */
    items2.forEach((it, idx) => {
      const barId = `L-${invId}-${idx + 1}`;
      const loan = ledger.find(x => x.type === 'سلف' && x.restoreBar && x.refId === barId && !x.reverses && !x.reversed);
      if (loan) {
        const newKh = it.khalas || 0;
        const oldKh = loan.amount || 0;
        const dK = _round6(newKh - oldKh);
        if (dK !== 0) {
          postEntry({ type:'تعديل', actType:'تعديل', customer: loan.customer, customerId: loan.customerId,
            debtGold: -dK, gold: 0, dinar: 0, note: reason, diffGold: -dK,
            desc:`تصحيح سلف سبيكة (${loan.customer}) سند #${invId}: ${reason}`,
            amount: Math.abs(dK), refId: invId });
        }
      }
    });

    /* 3) قيد تعديل (نفس اصطلاح الفاتورة الأصلية) — يحدّث المخزون وحساب الزبون */
    if (dNet !== 0 || dPrice !== 0) {
      postEntry({ type:'تعديل', actType:'تعديل', customer: inv.customer, customerId: inv.customerId || custIdFor(inv.customer),
        gold: -dNet, debtGold: +dNet, debtDinar: -dPrice, dinar: 0, note: reason, diffGold: dNet, diffDinar: dPrice,
        desc:`تصحيح فاتورة سند #${invId}: ${reason}`, amount: Math.abs(dPrice) || Math.abs(dNet), refId: invId });
    }
    setEditingInvoice(null);
    alert(`✅ عُدّل السند #${invId}\nفرق الخالص: ${fmt(dNet)} غ | فرق السعر: ${fmtInt(dPrice)} دج\nالسبب: ${reason}`);
  };

  /* ── الرصيد الافتتاحي ── */
  const handleSetOpening = (dinar, lingot, debts = [], bars = []) => {
    userInteractedRef.current = true;
    const today = getTodayDateString();
    const debtSummary = debts.length > 0 ? ` | ديون: ${debts.length} زبون` : '';
    const barSummary = bars.length > 0 ? ` | سبائك: ${bars.length}` : '';
    postEntry({ type:'opening', actType:'take', party:'النظام',
      dinar: dinar > 0 ? dinar : 0, gold: lingot > 0 ? lingot : 0,
      desc:`رصيد افتتاحي — كوفر: ${fmtInt(dinar)} دج | لانقو: ${fmt(lingot)} غ${barSummary}${debtSummary}`,
      amount: dinar, date:today });
    bars.forEach((b, idx) => {
      const bar = { id:`OPN-${Date.now()}-${idx}`, source:'رصيد افتتاحي', weight:b.weight, karat:b.karat, date:today };
      addLingot(bar);
      setLingotsInCoffer(p => [bar, ...p]);
    });
    debts.forEach(d => {
      const amt = d.amount || 0, g = d.gold || 0;
      if (amt === 0 && g === 0) return;
      postEntry({ type:'opening-debt', actType:'take', customer:d.name, customerId:custIdFor(d.name),
        debtDinar:-(amt), debtGold:-(g), desc:`دين افتتاحي: ${d.name}`, amount:Math.abs(amt), date:today });
    });
  };

  /* ── إلغاء فاتورة بقيد عكسي ── */
  const voidInvoice = (inv) => {
    userInteractedRef.current = true;
    const fin = ledger.find(e => e.refId === inv.id && e.type === 'رافيناج' && !e.reverses && !e.reversed);
    if (fin) reverseEntry(fin);
    const isMine = l => l.id && (l.id.startsWith(`L-${inv.id}-`) || l.id === `OUT-${inv.id}`);
    lingotsInCoffer.filter(isMine).forEach(l => deleteLingot(l.id));
    setLingotsInCoffer(p => p.filter(l => !isMine(l)));
    setInvoices(p => p.map(i => i.id === inv.id ? { ...i, voided:true } : i));
    addInvoice({ ...inv, voided:true });
  };

  const handleDeleteInvoice = (inv) => {
    if (!window.confirm(`⚠️ إلغاء الفاتورة #${inv.id} للزبون "${inv.customer}"؟\nسيُضاف قيد عكسي للسجل وتبقى الفاتورة في الأرشيف كملغاة.`)) return;
    voidInvoice(inv);
  };

  /* ── عكس عملية من السجل ── */
  const handleDeleteActivity = (act) => {
    userInteractedRef.current = true;
    const e = act && act._entry;
    if (!e) return;
    if (e.type === 'reversal') { alert('لا يمكن عكس قيدٍ عكسي.'); return; }
    if (e.reversed) { alert('هذه العملية مُلغاة مسبقاً.'); return; }
    if (!window.confirm(`⚠️ عكس هذه العملية بقيد مضاد؟\n${e.desc}`)) return;
    if (e.type === 'رافيناج' && e.refId) {
      const inv = invoices.find(i => i.id === e.refId);
      if (inv) { voidInvoice(inv); return; }
    }
    /* إلغاء سلف: اعكس الدين + أعِد السبيكة للكوفر + اعكس أجرة السلف إن وُجدت */
    if (e.type === 'سلف' && e.restoreBar) {
      reverseEntry(e);
      if (e.restoreBar.id) {
        const exists = lingotsInCoffer.some(l => l.id === e.restoreBar.id);
        if (!exists) { addLingot(e.restoreBar); setLingotsInCoffer(p => [e.restoreBar, ...p]); }
      }
      const feeSib = ledger.find(x => x.type === 'سلف' && x.actType === 'أجرة-سلف' && x.refId === e.refId && !x.reverses && !x.reversed);
      if (feeSib) reverseEntry(feeSib);
      return;
    }
    reverseEntry(e);
  };

  /* ── تحويل للورشة (بالمعرّف) ── */
  const handleConfirmTransfer = (workshopKey) => {
    userInteractedRef.current = true;
    const today = getTodayDateString();
    const ids = selectedBulksToTransfer;
    const moved = lingotsInCoffer
      .filter(item => ids.includes(item.id))
      .map(item => ({ ...item, transferDate: today, targetWorkshop: workshopKey }));
    moved.forEach(l => { deleteLingot(l.id); addWorkshopLingot(workshopKey, l); });
    setLingotsInCoffer(p => p.filter(item => !ids.includes(item.id)));
    if (workshopKey === 'workshop1') setWorkshop1Lingots(p => [...moved, ...p]);
    else setWorkshop2Lingots(p => [...moved, ...p]);
    setSelectedBulksToTransfer([]);
    setActiveTab(workshopKey);
  };

  /* ── إرجاع سبيكة للكوفر ── */
  const handleReturnToCoffer = (workshopKey, lingotId) => {
    userInteractedRef.current = true;
    const list = workshopKey === 'workshop1' ? workshop1Lingots : workshop2Lingots;
    const target = list.find(l => l.id === lingotId);
    if (!target) return;
    const wsName = workshopKey === 'workshop1' ? 'rahim' : 'rahim';
    const item = { ...target }; delete item.transferDate; delete item.targetWorkshop;
    /* السبيكة تحفظ مصدرها — إلا إن كانت روتور فتُسجَّل «روتور - [الورشة]» */
    const isRotor = (target.source || '').includes('روتور') || String(target.id || '').startsWith('ROT-');
    if (isRotor) item.source = `روتور - ${wsName}`;
    deleteWorkshopLingot(workshopKey, lingotId);
    addLingot(item);
    if (workshopKey === 'workshop1') setWorkshop1Lingots(p => p.filter(l => l.id !== lingotId));
    else setWorkshop2Lingots(p => p.filter(l => l.id !== lingotId));
    setLingotsInCoffer(p => [item, ...p]);
  };

  /* ── حفظ جلسة ورشة ── */
  const handleWorkshopSave = (ws) => ({ session, mfgWeight, rotorItems }) => {
    userInteractedRef.current = true;
    if (ws === 'workshop1') setWorkshop1Sessions(p => [session, ...p]);
    else setWorkshop2Sessions(p => [session, ...p]);
    addWorkshopSession(ws, session);
    const name = ws === 'workshop1' ? 'rahim' : 'rahim';
    postEntry({ type:'workshop', actType:'رافيناج', party:`ورشة ${name}`, gold:+mfgWeight,
      desc:`جلسة ورشة ${name}: سلعة واجدة ${fmt(mfgWeight)} غ`, amount:mfgWeight });
    if (rotorItems.length > 0) {
      const today = getTodayDateString();
      const prefix = ws === 'workshop1' ? 'W1' : 'W2';
      const newLingots = rotorItems.map((r, i) => ({
        id:`ROT-${prefix}-${Date.now()}-${i}`, source:`روتور - ${name}`,
        weight:parseFloat(r.weight) || 0, karat:parseFloat(r.karat) || 1000, date:today
      }));
      setLingotsInCoffer(p => [...newLingots, ...p]); newLingots.forEach(l => addLingot(l));
    }
  };

  /* ══════════════════════════════════════════════
     تسجيل الدخول + بيانات العامل + المطابقة
  ══════════════════════════════════════════════ */
  const handleLogin = (user) => { setSession(user); if(!AUTH.enabled) saveSession(user); setActiveTab('home'); setWorkerTab('workshop'); };
  const handleLogout = async () => {
    if (AUTH.enabled) { try { await fbSignOutAuth(); } catch (e) {} }
    setSession(null); clearSession();
  };

  /* تحقق الدخول — Firebase Auth عند التفعيل، وإلا الوضع القديم */
  const handleAuthenticate = async (username, password) => {
    const uname = username.trim();
    const staff = USERS.find(x => x.username.toLowerCase() === uname.toLowerCase());

    if (!AUTH.enabled) {
      if (staff && staff.password === password) {
        handleLogin({ username:staff.username, role:staff.role, workshop:staff.workshop||null, wsName:staff.wsName||null, accent:staff.accent||t.goldSolid });
        return null;
      }
      const phone = uname.replace(/[^0-9]/g, '');
      const cust = customerAuth.find(c =>
        ((phone && String(c.phone||c.key) === phone) || (c.name||'').trim().toLowerCase() === uname.toLowerCase())
        && String(c.pin) === String(password));
      if (cust) {
        handleLogin({ username:cust.name, role:'customer', customerName:cust.name, customerId:String(cust.phone||cust.key), accent:'#10B981' });
        return null;
      }
      return 'اسم المستخدم أو الرمز السري غير صحيح';
    }

    if (fbStatus !== 'online') return 'لا يوجد اتصال بالإنترنت لتسجيل الدخول';
    try {
      const email = staff ? staffEmail(staff.username) : custEmail(uname);
      const user  = await fbSignIn(email, password);
      const sess  = resolveAuthSession(user, customerAuth);
      if (sess) { setSession(sess); setActiveTab('home'); setWorkerTab('workshop'); }
      return null;
    } catch (e) { return authErrorAr(e); }
  };

  const handleWorkerAddBar = (ws) => ({ weight, karat }) => {
    userInteractedRef.current = true;
    const pfx = ws === 'workshop1' ? 'W1' : 'W2';
    const bar = { id:`WK-${pfx}-${Date.now()}-${Math.random().toString(36).slice(2,6)}`, weight, karat, date:getTodayDateString() };
    if (ws === 'workshop1') setWorker1Lingots(p => [bar, ...p]); else setWorker2Lingots(p => [bar, ...p]);
    addWorkerLingot(ws, bar);
  };

  const handleWorkerDeleteBar = (ws) => (id) => {
    userInteractedRef.current = true;
    if (ws === 'workshop1') setWorker1Lingots(p => p.filter(b => b.id !== id));
    else setWorker2Lingots(p => p.filter(b => b.id !== id));
    deleteWorkerLingot(ws, id);
  };

  const handleWorkerSaveSession = (ws) => (sess) => {
    userInteractedRef.current = true;
    if (ws === 'workshop1') setWorker1Sessions(p => [sess, ...p]); else setWorker2Sessions(p => [sess, ...p]);
    addWorkerSession(ws, sess);
    const bars = ws === 'workshop1' ? worker1Lingots : worker2Lingots;
    bars.forEach(b => deleteWorkerLingot(ws, b.id));
    if (ws === 'workshop1') setWorker1Lingots([]); else setWorker2Lingots([]);
  };

  const handleReconcile = async (ws) => {
    /* جلب أحدث سبائك العامل من السحابة للمقارنة فقط — لا نمسّ حالة العامل إطلاقاً */
    let workerBars = ws === 'workshop1' ? worker1Lingots : worker2Lingots;
    try {
      const fresh = await fbGetAll(`worker_${ws}`);
      if (fresh && fresh.length) workerBars = fresh;
    } catch (e) {}
    const adminBars = (ws === 'workshop1' ? workshop1Lingots : workshop2Lingots);
    const miss = reconcileBars(adminBars, workerBars);
    setMismatchIds(p => ({ ...p, [ws]: miss }));
    alert(miss.length === 0
      ? '✅ كل سبائكك مطابقة لسبائك العامل.'
      : `⚠️ ${miss.length} سبيكة غير مطابقة — ظهرت بالأحمر الفاتح.`);
  };

  /* أسماء الزبائن (من الديون + الفواتير) */
  const customerNames = useMemo(() => {
    const set = new Map();
    debtsList.forEach(d => { if (d.name) set.set(d.name.trim().toLowerCase(), d.name.trim()); });
    invoices.forEach(i => { if (i.customer) set.set(i.customer.trim().toLowerCase(), i.customer.trim()); });
    return Array.from(set.values()).sort((a, b) => a.localeCompare(b, 'ar'));
  }, [debtsList, invoices]);

  const custIdFor = (name) => {
    if (!name) return null;
    const norm = name.trim().toLowerCase();
    const c = customerAuth.find(x => (x.name||'').trim().toLowerCase() === norm);
    return c ? String(c.phone || c.key) : null;
  };

  /* ختم customerId على فواتير وقيود الزبون (للربط بحسابه) */
  const relinkCustomer = (name, phone) => {
    const norm = name.trim().toLowerCase();
    setInvoices(p => p.map(i => {
      if (i.customer && i.customer.trim().toLowerCase() === norm && i.customerId !== phone) {
        const ni = { ...i, customerId: phone }; addInvoice(ni); return ni;
      } return i;
    }));
    setLedger(p => p.map(e => {
      if (e.customer && e.customer.trim().toLowerCase() === norm && e.customerId !== phone) {
        const ne = { ...e, customerId: phone }; addLedgerEntry(ne); return ne;
      } return e;
    }));
  };

  const handleRegisterCustomer = async (name, phone, pin) => {
    userInteractedRef.current = true;
    const ph = String(phone).replace(/[^0-9]/g, '');
    if (String(pin).length < 6) { if (!window.confirm('الرمز أقل من ٦ خانات وقد يرفضه Firebase. المتابعة؟')) return; }
    if (AUTH.enabled) {
      try {
        await fbCreateUserSecondary(custEmail(ph), pin);
      } catch (e) {
        if (e && e.code && e.code.includes('email-already-in-use')) {
          alert('هذا الرقم له حساب مسبقاً — حُدّث الربط فقط. لتغيير الرمز استخدم «إعادة تعيين» من Firebase Console.');
        } else { alert('تعذّر إنشاء الحساب: ' + authErrorAr(e)); return; }
      }
    }
    const key = ph;
    setCustomerAuth(p => {
      const others = p.filter(c => (c.key || '') !== key && String(c.phone || '') !== ph && (c.name||'').trim().toLowerCase() !== name.trim().toLowerCase());
      return [...others, { key, name: name.trim(), phone: ph, pin: String(pin) }];
    });
    saveCustomerAuth(key, { name: name.trim(), phone: ph, pin: String(pin) });
    relinkCustomer(name, ph);
    alert(`✅ حساب الزبون "${name.trim()}"\nالدخول: ${ph}\nالرمز: ${pin}`);
  };

  const handleRemoveCustomerAuth = (key) => {
    userInteractedRef.current = true;
    setCustomerAuth(p => p.filter(c => (c.key || (c.name || '').trim().toLowerCase()) !== key));
    removeCustomerAuth(key);
  };

  /* ══════════════════════════════════════════════
     UI — شريط حالة Firebase
  ══════════════════════════════════════════════ */
  const FbBadge = () => {
    const cfg = {
      connecting: { color: '#F59E0B', dot: '#F59E0B', label: 'جاري الاتصال...' },
      online:     { color: '#10C98A', dot: '#10C98A', label: 'Firebase متصل' },
      offline:    { color: '#FF4D6D', dot: '#FF4D6D', label: 'بدون إنترنت' },
    }[fbStatus];
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 5,
        background: `${cfg.color}12`, border: `1px solid ${cfg.color}30`,
        borderRadius: 20, padding: '4px 11px', fontSize: 13, color: cfg.color, fontWeight: 700 }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: cfg.dot,
          display: 'inline-block', boxShadow: `0 0 5px ${cfg.dot}`,
          animation: fbStatus === 'connecting' ? 'pulse 1s infinite' : 'none' }}/>
        {cfg.label}
      </div>
    );
  };

  /* أثناء استعادة الجلسة المحفوظة (إعادة فتح التطبيق) */
  if (AUTH.enabled && !authResolved && !session) {
    return (
      <div dir="rtl" style={{ height:'100dvh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:14, background:t.appBg, color:t.textPrimary, fontFamily:"'Tajawal',system-ui,sans-serif" }}>
        <div style={{ width:46, height:46, borderRadius:'50%', border:`4px solid ${t.border}`, borderTopColor:t.goldSolid, animation:'spin 0.9s linear infinite' }}/>
        <div style={{ fontSize:15, fontWeight:800, color:t.textMuted }}>جارٍ استعادة الجلسة…</div>
        <style>{'@keyframes spin{to{transform:rotate(360deg)}}'}</style>
      </div>
    );
  }

  /* شاشة الطوارئ الوهمية (غوغل) — تُخفي التطبيق بالكامل */
  if (decoy) {
    const gl = [['G','#4285F4'],['o','#EA4335'],['o','#FBBC05'],['g','#4285F4'],['l','#34A853'],['e','#EA4335']];
    return (
      <div onContextMenu={e=>e.preventDefault()} style={{position:'fixed',inset:0,background:'#fff',zIndex:99999,display:'flex',flexDirection:'column',alignItems:'center',fontFamily:'arial,sans-serif',direction:'ltr'}}>
        <div style={{display:'flex',justifyContent:'flex-end',width:'100%',padding:'14px 18px',gap:18,fontSize:13,color:'#1a0dab',boxSizing:'border-box'}}>
          <span style={{cursor:'pointer',color:'#000'}}>Gmail</span><span style={{cursor:'pointer',color:'#000'}}>Images</span>
          <span style={{width:24,height:24,borderRadius:'50%',background:'#4285F4',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>A</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',marginTop:'14vh',width:'100%',padding:'0 16px',boxSizing:'border-box'}}>
          <div style={{fontSize:'clamp(56px,11vw,92px)',fontWeight:500,letterSpacing:-2,marginBottom:26,userSelect:'none'}}>
            {gl.map(([c,col],i)=><span key={i} style={{color:col}}>{c}</span>)}
          </div>
          <div style={{display:'flex',alignItems:'center',width:'min(560px,100%)',border:'1px solid #dfe1e5',borderRadius:24,padding:'11px 18px',boxShadow:'0 1px 6px rgba(32,33,36,.18)'}}>
            <span style={{color:'#9aa0a6',fontSize:18,marginRight:12}}>🔍</span>
            <input readOnly placeholder="" style={{flex:1,border:'none',outline:'none',fontSize:16,background:'transparent'}}/>
            <span style={{color:'#4285F4',fontSize:20,marginLeft:10}}>🎤</span>
          </div>
          <div style={{display:'flex',gap:12,marginTop:28}}>
            <div style={{background:'#f8f9fa',border:'1px solid #f8f9fa',borderRadius:4,padding:'9px 16px',fontSize:14,color:'#3c4043',cursor:'pointer'}}>Google Search</div>
            <div style={{background:'#f8f9fa',border:'1px solid #f8f9fa',borderRadius:4,padding:'9px 16px',fontSize:14,color:'#3c4043',cursor:'pointer'}}>I'm Feeling Lucky</div>
          </div>
        </div>
        <div style={{width:'100%',background:'#f2f2f2',color:'#70757a',fontSize:13,padding:'14px 22px',boxSizing:'border-box'}}>Algeria</div>
      </div>
    );
  }

  /* شاشة الدخول */
  if (!session) return <>{decoy && <DecoyScreen/>}<LoginScreen t={t} onAuthenticate={handleAuthenticate}/></>;

  /* بوابة الزبون — سجل معاملاته وفواتيره فقط (قراءة فقط) */
  if (session.role === 'customer') {
    const cname = session.customerName;
    const norm  = (cname || '').trim().toLowerCase();
    const myLedger = AUTH.enabled
      ? custData.ledger
      : recentActivities.filter(a => a._entry && a._entry.customer && a._entry.customer.trim().toLowerCase() === norm).map(a => a._entry);
    const myInvoices = (AUTH.enabled
      ? custData.invoices
      : invoices.filter(i => i.customer && i.customer.trim().toLowerCase() === norm)
    ).slice().sort((a,b)=>(Number(b.id)||0)-(Number(a.id)||0));
    const myDebt = myLedger.reduce((acc, e) => ({ amount: acc.amount + (e.debtDinar || 0), gold: acc.gold + (e.debtGold || 0) }), { amount: 0, gold: 0 });
    return (
      <>
        <CustomerPortal t={t} customerName={cname} customerId={session.customerId} accent={session.accent || '#10B981'}
          myLedger={myLedger} myInvoices={myInvoices} myDebt={myDebt}
          onOpenReceipt={inv => setActiveReceipt(inv)} onLogout={handleLogout}
          onEnableNotifications={handleEnableNotifications}
          dark={dark} setDark={setDark} fbBadge={<FbBadge/>}/>
        {activeReceipt && <ReceiptModal t={t} isOpen={!!activeReceipt} invoice={activeReceipt} onClose={() => setActiveReceipt(null)}/>}
        {editingInvoice && <EditInvoiceModal t={t} invoice={editingInvoice} onConfirm={handleEditInvoice} onClose={() => setEditingInvoice(null)}/>}
        {decoy && <DecoyScreen/>}
      </>
    );
  }

  /* واجهة العامل — ورشته وأرشيفه فقط (لا يرى بيانات المالك) */
  if (session.role === 'worker') {
    const ws      = session.workshop;
    const wsName  = session.wsName;
    const accent  = session.accent || t.goldSolid;
    const bars    = ws === 'workshop1' ? worker1Lingots : worker2Lingots;
    const wsSessions = ws === 'workshop1' ? worker1Sessions : worker2Sessions;
    const wNav = [
      { key:'workshop', Icon:HammerIco, label:`ورشة ${wsName}` },
      { key:'archive',  Icon:LayersIco, label:'أرشيف ورشتي' },
    ];
    return (
      <div dir="rtl" style={{ height:'100dvh', display:'flex', flexDirection:'column',
        background:t.appBgSolid||t.appBg, fontFamily:"'Tajawal',system-ui,sans-serif",
        color:t.textPrimary, overflow:'hidden' }}>
        <style>{`*{box-sizing:border-box;}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
          ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-thumb{background:${t.goldAccent};border-radius:999px;}
          .nav-btn{border:none;cursor:pointer;font-family:'Tajawal',system-ui,sans-serif;background:transparent;}
          input:focus,select:focus,button:focus{outline:none;}
          input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}`}</style>

        {/* HEADER */}
        <header style={{ background:t.headerBg, borderBottom:`1px solid ${t.border}`, padding:'0 18px',
          height:56, display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0, zIndex:20, boxShadow:t.headerShadow }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:34, height:34, borderRadius:9, background:`${accent}22`, border:`1px solid ${accent}45`,
              display:'flex', alignItems:'center', justifyContent:'center' }}><HammerIco size={17} color={accent}/></div>
            <div>
              <div style={{ fontWeight:900, fontSize:16, color:accent }}>ورشة {wsName}</div>
              <div style={{ fontSize:11, color:t.textMuted, fontWeight:700, letterSpacing:1 }}>GOLD REFINING PRO</div>
            </div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:7 }}>
            <FbBadge/>
            <div style={{ background:`${accent}14`, border:`1px solid ${accent}35`, borderRadius:20, padding:'4px 11px',
              fontSize:13, color:accent, fontWeight:800, display:'flex', alignItems:'center', gap:5 }}>
              <UserIco size={12} color={accent}/> {session.username}
            </div>
            <button onClick={() => setDark(!dark)}
              style={{ display:'flex', alignItems:'center', background:t.inputBg, border:`1px solid ${t.border}`,
                borderRadius:20, padding:'5px 9px', cursor:'pointer', fontFamily:'inherit' }}>
              {dark ? <SunIco size={13} color={t.goldSolid}/> : <MoonIco size={13} color={t.textSec}/>}
            </button>
            <button onClick={handleLogout}
              style={{ display:'flex', alignItems:'center', gap:5, background:`${t.red}12`, border:`1px solid ${t.red}35`,
                borderRadius:20, padding:'5px 12px', fontSize:13, color:t.red, fontWeight:800, cursor:'pointer', fontFamily:'inherit' }}>
              خروج
            </button>
          </div>
        </header>

        {/* CONTENT */}
        <main style={{ flex:1, padding:18, overflow:'auto', minHeight:0 }}>
          {workerTab === 'workshop'
            ? <WorkerWorkshopTab t={t} wsName={wsName} accentColor={accent} bars={bars}
                onAddBar={handleWorkerAddBar(ws)} onDeleteBar={handleWorkerDeleteBar(ws)} onSaveSession={handleWorkerSaveSession(ws)}/>
            : <WorkshopsArchiveTab t={t}
                workshop1Sessions={ws === 'workshop1' ? wsSessions : []}
                workshop2Sessions={ws === 'workshop2' ? wsSessions : []}/>}
        </main>

        {/* BOTTOM NAV */}
        <nav style={{ flexShrink:0, background:'#0B1020',
          backgroundImage:'linear-gradient(#0B1020,#0B1020),linear-gradient(90deg,#C8920A,#EDB84A,#C8920A)',
          backgroundOrigin:'border-box', backgroundClip:'padding-box,border-box', borderTop:'2px solid transparent',
          display:'flex', alignItems:'stretch', zIndex:25, boxShadow:'0 -6px 28px rgba(0,0,0,0.45)' }}>
          {wNav.map(({ key, Icon, label }) => {
            const act = workerTab === key;
            return (
              <button key={key} className="nav-btn" onClick={() => setWorkerTab(key)}
                style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4,
                  padding:'10px 14px', flex:1, color:act ? '#EDB84A' : '#4E6080', fontWeight:act ? 800 : 500, fontSize:13 }}>
                <div style={{ width:38, height:33, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center',
                  background:act ? 'linear-gradient(135deg,rgba(212,160,48,0.22),rgba(212,160,48,0.08))' : 'transparent',
                  border:act ? '1px solid rgba(212,160,48,0.35)' : '1px solid transparent' }}>
                  <Icon size={18} color={act ? '#EDB84A' : '#3D5070'}/>
                </div>
                <span style={{ whiteSpace:'nowrap', fontSize:13 }}>{label}</span>
              </button>
            );
          })}
        </nav>
      </div>
    );
  }

  return (
    <div dir="rtl" style={{ height: '100dvh', display: 'flex', flexDirection: 'column',
      background: t.appBgSolid || t.appBg, fontFamily: "'Tajawal',system-ui,sans-serif",
      color: t.textPrimary, transition: 'background 0.25s,color 0.25s', overflow: 'hidden' }}>

      <style>{`
        *{box-sizing:border-box;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:${t.goldAccent};border-radius:999px;}
        .nav-btn{transition:all 0.18s cubic-bezier(.4,0,.2,1);border:none;cursor:pointer;font-family:'Tajawal',system-ui,sans-serif;background:transparent;}
        .nav-btn:hover .nav-icon-wrap{background:${t.dark ? 'rgba(212,160,48,0.12)' : 'rgba(212,160,48,0.09)'}!important;}
        .row-h{transition:background 0.12s;}
        .row-h:hover{background:${t.rowHover}!important;}
        input:focus,select:focus,button:focus{outline:none;}
        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
        select{appearance:none;-webkit-appearance:none;}
        .card-hover:hover{box-shadow:${t.dark ? '0 4px 20px rgba(0,0,0,0.4)' : '0 4px 16px rgba(15,29,54,0.12)'}!important;}
      `}</style>

      <TransferModal t={t} isOpen={selectedBulksToTransfer.length > 0} selectedCount={selectedBulksToTransfer.length}
        onClose={() => setSelectedBulksToTransfer([])} onConfirmTransfer={handleConfirmTransfer}/>

      <ReceiptModal t={t} isOpen={!!activeReceipt} invoice={activeReceipt} onClose={() => setActiveReceipt(null)}/>

      {editingInvoice && <EditInvoiceModal t={t} invoice={editingInvoice} onConfirm={handleEditInvoice} onClose={() => setEditingInvoice(null)}/>}
      {showResetModal && <ResetModal t={t} onClose={() => setShowResetModal(false)}/>}
      {decoy && <DecoyScreen/>}

      {/* HEADER */}
      <header style={{ background: t.headerBg, borderBottom: `1px solid ${t.border}`, padding: isMobile ? '0 10px' : '0 20px',
        height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        flexShrink: 0, zIndex: 20, boxShadow: t.headerShadow }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: 9, background: t.goldGrad,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: `0 2px 8px ${t.goldAccent}45` }}>
            <SparklesIco size={16} color="#3A1F00"/>
          </div>
          <div>
            <div style={{ fontWeight: 900, fontSize: 17, lineHeight: 1.1, background: t.goldGrad,
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>منظومة الرفاينج</div>
            <div style={{ fontSize: 11, color: t.textMuted, fontWeight: 700, letterSpacing: 1 }}>GOLD REFINING PRO <span style={{ color: t.goldSolid, fontWeight: 900, letterSpacing: 0 }}>· {APP_VERSION}</span></div>
          </div>
        </div>

        {!isMobile && <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
          {React.createElement(NAV.find(n => n.key === activeTab)?.Icon || HomeIco, { size: 15, color: t.goldAccent })}
          <span style={{ color: t.textPrimary, fontSize: 18, fontWeight: 800 }}>
            {NAV.find(n => n.key === activeTab)?.label}
          </span>
        </div>}

        <div style={{ display: 'flex', alignItems: 'center', gap: isMobile ? 5 : 7 }}>
          <FbBadge/>
          {!isMobile && <div style={{ background: t.dark ? `${t.goldAccent}12` : `${t.goldAccent}0E`,
            border: `1px solid ${t.goldAccent}35`, borderRadius: 20, padding: '4px 11px',
            fontSize: 14, fontFamily: 'monospace', color: t.goldSolid, fontWeight: 700 }}>
            {getTodayDateString()}
          </div>}
          <button onClick={() => setDark(!dark)}
            style={{ display: 'flex', alignItems: 'center', gap: 5,
              background: dark ? `${t.goldAccent}15` : t.inputBg,
              border: `1px solid ${dark ? t.goldAccent + '35' : t.border}`,
              borderRadius: 20, padding: isMobile ? '6px 8px' : '4px 11px', fontSize: 14,
              color: dark ? t.goldSolid : t.textSec, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>
            {dark ? <SunIco size={12} color={t.goldSolid}/> : <MoonIco size={12} color={t.textSec}/>}
            {!isMobile && <span>{dark ? 'فاتح' : 'داكن'}</span>}
          </button>
          <button onClick={handleExportData}
            style={{ display: 'flex', alignItems: 'center', gap: 5, background: t.inputBg,
              border: `1px solid ${t.border}`, borderRadius: 20, padding: isMobile ? '6px 8px' : '4px 11px',
              fontSize: 14, color: t.textSec, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>
            <ShareIco size={12} color={t.textSec}/>{!isMobile && <span>نسخة</span>}
          </button>
          <button onClick={() => importInputRef.current && importInputRef.current.click()}
            style={{ display: 'flex', alignItems: 'center', gap: 5, background: t.inputBg,
              border: `1px solid ${t.border}`, borderRadius: 20, padding: isMobile ? '6px 8px' : '4px 11px',
              fontSize: 14, color: t.textSec, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>
            <RotateIco size={12} color={t.textSec}/>{!isMobile && <span>استعادة</span>}
          </button>
          <input ref={importInputRef} type="file" accept=".json" onChange={handleImportData} style={{ display: 'none' }}/>
          <button onClick={() => setShowResetModal(true)}
            title="مسح جميع البيانات"
            style={{ display: 'flex', alignItems: 'center', gap: 5, background: `${t.red}12`,
              border: `1px solid ${t.red}40`, borderRadius: 20, padding: isMobile ? '6px 8px' : '4px 11px',
              fontSize: 14, color: t.red, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>
            <TrashIco size={12} color={t.red}/>{!isMobile && <span>مسح</span>}
          </button>
          <button onClick={handleLogout}
            style={{ display: 'flex', alignItems: 'center', gap: 5, background: `${t.red}12`,
              border: `1px solid ${t.red}35`, borderRadius: 20, padding: isMobile ? '6px 10px' : '4px 11px',
              fontSize: 14, color: t.red, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>
            <span>خروج</span>
          </button>
        </div>
      </header>

      {/* CONTENT */}
      <main style={{ flex: 1, padding: activeTab === 'invoice' ? 0 : (isMobile ? 10 : 20),
        overflow: activeTab === 'invoice' ? 'hidden' : 'auto', minHeight: 0, display: 'flex', flexDirection: 'column' }}>
        {activeTab === 'home' && <HomeTab t={t} dinarCofferTotal={dinarCofferTotal}
          extraLingotBalance={extraLingotBalance} lingotsTotalWeight={lingotsTotalWeight}
          recentActivities={recentActivities} onAkhadAction={handleAkhadAction}
          onDafaaAction={handleDafaaAction} onDirectExpenseAction={handleDirectExpenseAction}
          openingDone={openingDone} onSetOpening={handleSetOpening} customerNames={customerNames}/>}
        <div style={{ display: activeTab === 'invoice' ? 'flex' : 'none', flex: 1, minHeight: 0 }}>
          <InvoiceTab t={t} onSaveInvoice={handleSaveInvoice} debtsList={debtsList}
            nextInvoiceId={nextInvoiceId} extraLingotBalance={extraLingotBalance} isMobile={isMobile} customerNames={customerNames}/>
        </div>
        {activeTab === 'coffer'     && <CofferTab t={t} lingots={lingotsInCoffer} onOpenTransferModal={i => setSelectedBulksToTransfer(i)} onLoanLingot={handleLoanLingot}
          onAddBar={(w,k,src)=>{ userInteractedRef.current=true; const bar={id:`MAN-${Date.now()}`,source:src,weight:w,karat:k,date:getTodayDateString()}; addLingot(bar); setLingotsInCoffer(p=>[bar,...p]); }}
          onEditBar={(id,w,k)=>{ userInteractedRef.current=true; setLingotsInCoffer(p=>p.map(l=>{ if(l.id===id){ const nl={...l,weight:w,karat:k}; addLingot(nl); return nl; } return l; })); }}
          onDeleteBar={(id)=>{ userInteractedRef.current=true; deleteLingot(id); setLingotsInCoffer(p=>p.filter(l=>l.id!==id)); }}
          customerNames={customerNames}/>}
        {activeTab === 'log'        && <LogTab t={t} invoices={invoices} onOpenReceipt={inv => setActiveReceipt(inv)} onDeleteInvoice={handleDeleteInvoice} onEditInvoice={inv => setEditingInvoice(inv)}/>}
        {activeTab === 'operations' && <OperationsLogTab t={t} activities={recentActivities} customers={debtsList}
          onClearActivities={() => {}}
          onDeleteActivity={handleDeleteActivity}/>}
        {activeTab === 'debts'      && <DebtsTab t={t} debtsList={debtsList} customerNames={customerNames} onTransfer={handleTransferDebt}/>}
        {activeTab === 'customers'  && <CustomerAccountsTab t={t} names={customerNames} accounts={customerAuth} onRegister={handleRegisterCustomer} onRemove={handleRemoveCustomerAuth} authEnabled={AUTH.enabled}/>}
        {activeTab === 'workshops'  && <WorkshopsArchiveTab t={t} workshop1Sessions={workshop1Sessions} workshop2Sessions={workshop2Sessions}/>}
        <div style={{ display: activeTab === 'workshop1' ? 'flex' : 'none', flexDirection:'column', flex: 1, minHeight: 0 }}>
          <WorkshopTab t={t} title="rahim" description="ورشة rahim للصياغة والتصنيع"
          accentColor="#0EA5E9" lingots={workshop1Lingots}
          onReturnToCoffer={id => handleReturnToCoffer('workshop1', id)}
          onUpdateLingots={ls => { ls.forEach(l => addWorkshopLingot('workshop1', l)); setWorkshop1Lingots(ls); }}
          onSave={handleWorkshopSave('workshop1')}
          onClearLingots={() => { workshop1Lingots.forEach(l => deleteWorkshopLingot('workshop1', l.id)); setWorkshop1Lingots([]); }}
          mismatchIds={mismatchIds.workshop1} onReconcile={() => handleReconcile('workshop1')}/>
        </div>
      </main>

      {/* BOTTOM NAV */}
      <nav style={{ flexShrink: 0, background: '#0B1020', borderTop: '2px solid transparent',
        backgroundImage: 'linear-gradient(#0B1020,#0B1020),linear-gradient(90deg,#C8920A,#EDB84A,#C8920A)',
        backgroundOrigin: 'border-box', backgroundClip: 'padding-box,border-box',
        display: 'flex', alignItems: 'stretch', overflowX: 'auto', zIndex: 25,
        boxShadow: '0 -6px 28px rgba(0,0,0,0.45)' }}>
        {NAV.map(({ key, Icon, label }) => {
          const active = activeTab === key;
          return (
            <button key={key} className="nav-btn" onClick={() => setActiveTab(key)}
              style={{ display: 'flex', flexDirection: 'column', alignItems: 'center',
                justifyContent: 'center', gap: 4, padding: '10px 14px', flex: '1 0 auto',
                minWidth: 72, position: 'relative', color: active ? '#EDB84A' : '#4E6080',
                fontWeight: active ? 800 : 500, fontSize: 13 }}>
              {active && <div style={{ position: 'absolute', top: 0, left: '15%', right: '15%',
                height: 2, background: 'linear-gradient(90deg,transparent,#EDB84A,transparent)',
                borderRadius: '0 0 4px 4px' }}/>}
              <div className="nav-icon-wrap" style={{ width: 38, height: 33, borderRadius: 10,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: active ? 'linear-gradient(135deg,rgba(212,160,48,0.22),rgba(212,160,48,0.08))' : 'transparent',
                border: active ? '1px solid rgba(212,160,48,0.35)' : '1px solid transparent' }}>
                <Icon size={18} color={active ? '#EDB84A' : '#3D5070'}/>
              </div>
              <span style={{ whiteSpace: 'nowrap', letterSpacing: 0.3, fontSize: 13 }}>{label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RafinageApp/>);

</script>
</body>
</html>
