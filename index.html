function fmt(num) {
  if (num===null||num===undefined||isNaN(num)||!isFinite(num)) return '0,00';
  const fixed = num.toFixed(2);
  const parts = fixed.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'\u00A0');
  return parts.join(',');
}
function fmtInt(num) {
  if (num===null||num===undefined||isNaN(num)||!isFinite(num)) return '0';
  return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00A0');
}
function getTodayDateString() {
  const d=new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();

/* ── حالة الاتصال ── */
let _fbApp = null;
let _db = null;
let _fbReady = false;
let _fbError = null;
let _onlineListeners = [];

function onFbStatusChange(fn) { _onlineListeners.push(fn); }
function _notifyStatus() { _onlineListeners.forEach(fn => fn(_fbReady, _fbError)); }

/* ── تهيئة Firebase ── */
async function initFirebase() {
  try {
    const { initializeApp, getApps } = await _loadSDK('app');
    const { getFirestore, enableIndexedDbPersistence } = await _loadSDK('firestore');

    if (getApps().length === 0) {
      _fbApp = initializeApp(FIREBASE_CONFIG);
    } else {
      _fbApp = getApps()[0];
    }

    _db = getFirestore(_fbApp);

    /* تهيئة المصادقة */
    try { await initAuth(); } catch (e) { console.warn('[Auth] init', e.message); }

    /* تفعيل التخزين المحلي للعمل بدون إنترنت */
    try {
      await enableIndexedDbPersistence(_db);
    } catch (e) {
      /* إذا كانت مفتوحة في أكثر من نافذة — لا مشكلة */
    }

    _fbReady = true;
    _fbError = null;
    _notifyStatus();
    console.log('[Firebase] ✅ متصل');
  } catch (err) {
    _fbReady = false;
    _fbError = err.message;
    _notifyStatus();
    console.warn('[Firebase] ⚠️ خطأ في الاتصال:', err.message);
  }
}

/* ── محمِّل SDK ديناميكي ── */
const _sdkCache = {};
async function _loadSDK(name) {
  if (_sdkCache[name]) return _sdkCache[name];
  const urls = {
    app:       'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js',
    firestore: 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js',
    auth:      'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js',
    messaging: 'https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js',
  };
  const mod = await import(urls[name]);
  _sdkCache[name] = mod;
  return mod;
}

/* ══════════════════════════════════════════════
   LOCAL STORAGE — النسخة المحلية (offline-first)
══════════════════════════════════════════════ */
const LS_KEY = 'rafinage_db_v1';

function loadDB() {
  try {
    const r = localStorage.getItem(LS_KEY);
    return r ? JSON.parse(r) : {};
  } catch (e) { return {}; }
}

function saveDB(data) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  } catch (e) {}
}

/* ══════════════════════════════════════════════
   FIRESTORE HELPERS — السجل التراكمي
   كل مجموعة = مصفوفة من documents
══════════════════════════════════════════════ */

async function _fsCollection(name) {
  const { collection, getFirestore } = await _loadSDK('firestore');
  return collection(_db, name);
}

/* حفظ document بـ ID محدد */
async function fbSet(colName, docId, data) {
  if (!_fbReady) return false;
  try {
    const { doc, setDoc, serverTimestamp, getFirestore } = await _loadSDK('firestore');
    const ref = doc(_db, colName, String(docId));
    await setDoc(ref, { ...data, _updatedAt: serverTimestamp() }, { merge: true });
    return true;
  } catch (e) {
    console.warn('[fbSet]', colName, e.message);
    return false;
  }
}

/* إضافة document بـ ID تلقائي */
async function fbAdd(colName, data) {
  if (!_fbReady) return null;
  try {
    const { collection, addDoc, serverTimestamp } = await _loadSDK('firestore');
    const col = await _fsCollection(colName);
    const ref = await addDoc(col, { ...data, _createdAt: serverTimestamp() });
    return ref.id;
  } catch (e) {
    console.warn('[fbAdd]', colName, e.message);
    return null;
  }
}

/* جلب مجموعة كاملة (يُرجع كل المستندات ويرتّب محلياً) */
async function fbGetAll(colName) {
  if (!_fbReady) return null;
  try {
    const { getDocs, query, limit } = await _loadSDK('firestore');
    const col = await _fsCollection(colName);
    const snap = await getDocs(query(col, limit(5000)));
    const arr = snap.docs.map(d => ({ _fbId: d.id, ...d.data() }));
    const ts = (x) => (x && x._createdAt && x._createdAt.seconds) ||
                      (x && x._updatedAt && x._updatedAt.seconds) || 0;
    arr.sort((a, b) => ts(b) - ts(a));
    return arr;
  } catch (e) {
    console.warn('[fbGetAll]', colName, e.message);
    return null;
  }
}

/* اشتراك لحظي (realtime) في مجموعة — يستدعي cb عند أي تغيير محلي أو سحابي */
function fbSubscribe(colName, cb) {
  if (!_fbReady) return () => {};
  let unsub = () => {};
  let live = true;
  (async () => {
    try {
      const { onSnapshot, query, limit } = await _loadSDK('firestore');
      const col = await _fsCollection(colName);
      const u = onSnapshot(query(col, limit(5000)), (snap) => {
        const arr = snap.docs.map(d => ({ _fbId: d.id, ...d.data() }));
        const ts = (x) => (x && x._createdAt && x._createdAt.seconds) ||
                          (x && x._updatedAt && x._updatedAt.seconds) || 0;
        arr.sort((a, b) => ts(b) - ts(a));
        cb(arr);
      }, (err) => console.warn('[fbSubscribe]', colName, err.message));
      if (live) unsub = u; else u();
    } catch (e) { console.warn('[fbSubscribe]', colName, e.message); }
  })();
  return () => { live = false; try { unsub(); } catch {} };
}

let _auth = null, _authUser = null, _authReady = false;
let _authListeners = [];

async function initAuth() {
  const { getAuth, onAuthStateChanged, browserLocalPersistence, setPersistence } = await _loadSDK('auth');
  _auth = getAuth(_fbApp);
  try { await setPersistence(_auth, browserLocalPersistence); } catch (e) {}
  onAuthStateChanged(_auth, (u) => {
    _authUser = u; _authReady = true;
    _authListeners.forEach(fn => fn(u));
  });
}

function onAuthChange(fn) {
  _authListeners.push(fn);
  if (_authReady) fn(_authUser);
}

async function fbSignIn(email, password) {
  const { getAuth, signInWithEmailAndPassword } = await _loadSDK('auth');
  if (!_auth) _auth = getAuth(_fbApp);
  const cred = await signInWithEmailAndPassword(_auth, email, password);
  return cred.user;
}

/* إنشاء حساب جديد دون إخراج المالك (تطبيق ثانوي مؤقت) */
async function fbCreateUserSecondary(email, password) {
  const { initializeApp, deleteApp } = await _loadSDK('app');
  const { getAuth, createUserWithEmailAndPassword, signOut } = await _loadSDK('auth');
  const secApp = initializeApp(FIREBASE_CONFIG, 'sec-' + Date.now());
  const secAuth = getAuth(secApp);
  try {
    const cred = await createUserWithEmailAndPassword(secAuth, email, password);
    const uid = cred.user.uid;
    try { await signOut(secAuth); } catch (e) {}
    await deleteApp(secApp);
    return uid;
  } catch (e) {
    try { await deleteApp(secApp); } catch (_) {}
    throw e;
  }
}

/* ── تشفير النسخ الاحتياطية AES-GCM ── */
function _bufToB64(buf){let s='';const b=new Uint8Array(buf);const ch=0x8000;for(let i=0;i<b.length;i+=ch){s+=String.fromCharCode.apply(null,b.subarray(i,i+ch));}return btoa(s);}
function _b64ToBuf(b64){return Uint8Array.from(atob(b64),c=>c.charCodeAt(0));}
async function _aesKey(){
  const raw=new TextEncoder().encode('RAFINAG-BACKUP-KEY-v1::rafinag-157d2');
  const hash=await crypto.subtle.digest('SHA-256',raw);
  return crypto.subtle.importKey('raw',hash,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function encryptJSON(obj){
  const key=await _aesKey();
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const data=new TextEncoder().encode(JSON.stringify(obj));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,data);
  return {__enc:true,v:1,iv:_bufToB64(iv.buffer),data:_bufToB64(ct)};
}
async function decryptJSON(env){
  const key=await _aesKey();
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:_b64ToBuf(env.iv)},key,_b64ToBuf(env.data));
  return JSON.parse(new TextDecoder().decode(pt));
}
function downloadJSONFile(objText,filename){
  const blob=new Blob([objText],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

      const x=r.left+r.width/2, y=r.top+r.height/2;

         <span style={{fontSize:13,color:t.textMuted,fontWeight:700}}>أنا أعطيت للزبون — يدين بالمبلغ</span>
         <span style={{fontWeight:900,fontSize:18,color:t.textPrimary}}>أخذ</span>
       </div>
       <input type="text" list="rf-cn" placeholder="اسم الزبون..." value={takeCustomer} onChange={e=>setTakeCustomer(e.target.value)}
         onKeyDown={e=>e.key==='Enter'&&submitTake()}
         style={{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px 12px',fontSize:16,fontWeight:700,color:t.textPrimary,fontFamily:'inherit',textAlign:'right'}}/>
       <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
         {qtyInput(takeType,takeQuantity,setTakeQuantity,submitTake,{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px',fontSize:16,fontWeight:900,textAlign:'center',fontFamily:'monospace',color:t.textPrimary})}
         <datalist id="rf-cn">{customerNames.map((n,i)=><option key={i} value={n}/>)}</datalist>
         {typeToggle(takeType,setTakeType,'لانقو','دينار',`linear-gradient(135deg,${t.red},#BE1A38)`)}
       </div>
       <input type="text" placeholder="ملاحظة (اختياري)..." value={takeNote} onChange={e=>setTakeNote(e.target.value)}
         onKeyDown={e=>e.key==='Enter'&&submitTake()}
         style={{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px 12px',fontSize:14,fontWeight:600,color:t.textPrimary,fontFamily:'inherit',textAlign:'right'}}/>
       <div style={{display:'flex',gap:8}}>
         <button onClick={submitTake} style={{flex:1,padding:'9px',background:t.red,border:'none',borderRadius:9,color:'white',fontWeight:900,fontSize:16,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
           <CheckIco size={14} color="white"/> تأكيد الأخذ
         </button>
         <button onClick={()=>setTakeActive(false)} style={{padding:'9px 14px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,color:t.textSec,fontWeight:800,fontSize:16,cursor:'pointer',fontFamily:'inherit'}}>إلغاء</button>
       </div>
     </div>},
    {key:'give',label:'دفع',Ico:UpIco,color:t.green,active:giveActive,
     content:<div style={{display:'flex',flexDirection:'column',gap:10,textAlign:'right'}}>
       <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingBottom:10,borderBottom:`1px solid ${t.border}`}}>
         <span style={{fontSize:13,color:t.textMuted,fontWeight:700}}>الزبون أعطاني — ينقص من دينه</span>
         <span style={{fontWeight:900,fontSize:18,color:t.textPrimary}}>دفع</span>
       </div>
       <input type="text" list="rf-cn" placeholder="اسم الزبون..." value={giveCustomer} onChange={e=>setGiveCustomer(e.target.value)}
         onKeyDown={e=>e.key==='Enter'&&submitGive()}
         style={{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px 12px',fontSize:16,fontWeight:700,color:t.textPrimary,fontFamily:'inherit',textAlign:'right'}}/>
       <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
         {qtyInput(giveType,giveQuantity,setGiveQuantity,submitGive,{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px',fontSize:16,fontWeight:900,textAlign:'center',fontFamily:'monospace',color:t.textPrimary})}
         {typeToggle(giveType,setGiveType,'لانقو','دينار',`linear-gradient(135deg,${t.green},#059669)`)}
       </div>
       <input type="text" placeholder="ملاحظة (اختياري)..." value={giveNote} onChange={e=>setGiveNote(e.target.value)}
         onKeyDown={e=>e.key==='Enter'&&submitGive()}
         style={{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px 12px',fontSize:14,fontWeight:600,color:t.textPrimary,fontFamily:'inherit',textAlign:'right'}}/>
       <div style={{display:'flex',gap:8}}>
         <button onClick={submitGive} style={{flex:1,padding:'9px',background:t.green,border:'none',borderRadius:9,color:'white',fontWeight:900,fontSize:16,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
           <CheckIco size={14} color="white"/> تأكيد الدفع
         </button>
         <button onClick={()=>setGiveActive(false)} style={{padding:'9px 14px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,color:t.textSec,fontWeight:800,fontSize:16,cursor:'pointer',fontFamily:'inherit'}}>إلغاء</button>
       </div>
     </div>},
    {key:'expense',label:'مصاريف',Ico:BagIco,color:t.goldSolid,active:expenseActive,
     content:<div style={{display:'flex',flexDirection:'column',gap:10,textAlign:'right'}}>
       <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingBottom:10,borderBottom:`1px solid ${t.border}`}}>
         <span style={{fontSize:13,color:t.textMuted,fontWeight:700}}>صرف من الكوفر</span>
         <span style={{fontWeight:900,fontSize:18,color:t.textPrimary}}>مصاريف</span>
       </div>
       <input type="text" placeholder="مثال: شراء غاز، كراء..." value={expenseDesc} onChange={e=>setExpenseDesc(e.target.value)}
         onKeyDown={e=>e.key==='Enter'&&submitExpense()}
         style={{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px 12px',fontSize:16,fontWeight:700,color:t.textPrimary,fontFamily:'inherit',textAlign:'right'}}/>
       <input type="text" inputMode="numeric" placeholder="0" value={expenseAmount?fmtInt(expenseAmount):''} onChange={e=>setExpenseAmount(e.target.value.replace(/[^\d]/g,''))}
         onKeyDown={e=>e.key==='Enter'&&submitExpense()}
         style={{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px',fontSize:16,fontWeight:900,textAlign:'center',fontFamily:'monospace',color:t.textPrimary}}/>
       <div style={{display:'flex',gap:8}}>
         <button onClick={submitExpense} style={{flex:1,padding:'9px',background:t.goldSolid,border:'none',borderRadius:9,color:'#3A1F00',fontWeight:900,fontSize:16,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
           <CheckIco size={14} color="#3A1F00"/> تأكيد الصرف
         </button>
         <button onClick={()=>setExpenseActive(false)} style={{padding:'9px 14px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,color:t.textSec,fontWeight:800,fontSize:16,cursor:'pointer',fontFamily:'inherit'}}>إلغاء</button>
       </div>
     </div>},
  ];

  const actCfg={
    take:{color:'#10B981',label:'استلام'},
    'take-gold':{color:'#10B981',label:'استلام ذهب'},
    give:{color:'#EF4444',label:'تسليم'},
    'give-gold':{color:'#EF4444',label:'تسليم ذهب'},
    expense:{color:'#F59E0B',label:'مصاريف'},
    رافيناج:{color:'#818CF8',label:'رافيناج'},
    reversal:{color:'#94A3B8',label:'قيد عكسي'},
  };

  const G='linear-gradient(135deg,#D4A030,#EDB84A,#C8920A)';
  const inputStyle={background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:10,padding:'9px 13px',fontSize:15,fontWeight:700,color:t.textPrimary,fontFamily:'inherit',textAlign:'right',width:'100%',boxSizing:'border-box'};
  const numStyle={...inputStyle,textAlign:'center',fontFamily:'monospace',fontSize:17,fontWeight:900};

  const mkForm=(title,hint,color,colorLight,fields,onConfirm,onCancel,confirmLabel)=>(
    <div style={{display:'flex',flexDirection:'column',gap:11}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingBottom:10,borderBottom:`1px solid ${t.border}`}}>
        <span style={{fontSize:12,color:t.textMuted,fontWeight:700}}>{hint}</span>
        <span style={{fontWeight:900,fontSize:17,color}}>{title}</span>
      </div>
      {fields}
      <div style={{display:'flex',gap:8,marginTop:2}}>
        <button onClick={onConfirm}
          style={{flex:1,padding:'10px',background:color,border:'none',borderRadius:10,color:'white',fontWeight:900,fontSize:15,cursor:'pointer',fontFamily:'inherit',
            display:'flex',alignItems:'center',justifyContent:'center',gap:6,letterSpacing:0.5,
            boxShadow:`0 4px 14px ${colorLight}`}}>
          <CheckIco size={13} color="white"/> {confirmLabel}
        </button>
        <button onClick={onCancel}
          style={{padding:'10px 14px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:10,color:t.textSec,fontWeight:800,fontSize:15,cursor:'pointer',fontFamily:'inherit'}}>
          ✕
        </button>
      </div>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>

      {/* ── أرصدة افتتاحية ── */}
      {!openingDone&&(
        <div style={{
          background:'linear-gradient(135deg,#0F1D36,#1A2D50)',
          borderRadius:16,border:'2px dashed rgba(212,160,48,0.45)',
          padding:'20px 24px',position:'relative',overflow:'hidden',
        }}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'linear-gradient(90deg,transparent,#EDB84A,transparent)'}}/>
          {!openingOpen?(
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
              <div>
                <div style={{fontSize:14,color:'rgba(237,184,74,0.9)',fontWeight:900,marginBottom:4}}>◈ الأرصدة الافتتاحية</div>
                <div style={{fontSize:13,color:'rgba(255,255,255,0.5)',fontWeight:700}}>أدخل رصيد الكوفر، اللانقو، والديون الابتدائية</div>
              </div>
              <button onClick={()=>setOpeningOpen(true)}
                style={{padding:'10px 22px',background:'linear-gradient(135deg,#D4A030,#EDB84A)',border:'none',borderRadius:10,
                  color:'#1A0A00',fontWeight:900,fontSize:15,cursor:'pointer',fontFamily:'inherit',
                  boxShadow:'0 4px 18px rgba(212,160,48,0.35)',letterSpacing:0.5}}>
                ✦ إدخال الأرصدة
              </button>
            </div>
          ):(
            <div ref={opFormRef} data-opform style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:'rgba(255,255,255,0.4)',fontWeight:700}}>تُدخل مرة واحدة فقط</span>
                <span style={{fontSize:15,fontWeight:900,color:'rgba(237,184,74,0.9)'}}>الأرصدة الافتتاحية</span>
              </div>

              {/* ── الكوفر واللانقو ── */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <div style={{fontSize:12,color:'rgba(237,184,74,0.7)',fontWeight:800,marginBottom:5,textAlign:'right'}}>صوارد الكوفر (دج)</div>
                  <input type="number" value={opDinar} onChange={e=>setOpDinar(e.target.value)} onKeyDown={navField} placeholder="0"
                    style={{width:'100%',boxSizing:'border-box',background:'rgba(255,255,255,0.07)',border:'1px solid rgba(237,184,74,0.3)',
                      borderRadius:10,padding:'9px 12px',fontSize:16,fontWeight:900,fontFamily:'monospace',color:'#EDB84A',textAlign:'center'}}/>
                </div>
                <div>
                  <div style={{fontSize:12,color:'rgba(52,211,153,0.8)',fontWeight:800,marginBottom:5,textAlign:'right'}}>باقي اللانقو (غ)</div>
                  <input type="number" step="0.001" value={opLingot} onChange={e=>setOpLingot(e.target.value)} onKeyDown={navField} placeholder="0.000"
                    style={{width:'100%',boxSizing:'border-box',background:'rgba(255,255,255,0.07)',border:'1px solid rgba(52,211,153,0.3)',
                      borderRadius:10,padding:'9px 12px',fontSize:16,fontWeight:900,fontFamily:'monospace',color:'#34D399',textAlign:'center'}}/>
                </div>
              </div>

              {/* ── سبائك افتتاحية في الكوفر ── */}
              <div style={{borderTop:'1px solid rgba(255,255,255,0.1)',paddingTop:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <button onClick={addBarRow}
                    style={{padding:'5px 12px',background:'rgba(212,175,55,0.15)',border:'1px solid rgba(212,175,55,0.35)',
                      borderRadius:8,color:'#EDB84A',fontWeight:800,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
                    + إضافة سبيكة
                  </button>
                  <span style={{fontSize:13,color:'rgba(255,255,255,0.5)',fontWeight:800}}>◈ سبائك الكوفر الافتتاحية</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1.4fr 1.4fr 28px',gap:6,marginBottom:6}}>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',fontWeight:800,textAlign:'center'}}>الميزان (غ)</div>
                  <div style={{fontSize:11,color:'rgba(237,184,74,0.5)',fontWeight:800,textAlign:'center'}}>العيار</div>
                  <div/>
                </div>
                {opBars.map((row,i)=>(
                  <div key={i} style={{display:'grid',gridTemplateColumns:'1.4fr 1.4fr 28px',gap:6,marginBottom:6}}>
                    <input type="number" step="0.001" value={row.weight} onChange={e=>updateBarRow(i,'weight',e.target.value)} onKeyDown={navField}
                      placeholder="0.000"
                      style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.15)',
                        borderRadius:8,padding:'7px 8px',fontSize:13,fontWeight:900,fontFamily:'monospace',color:'#EDF1FF',textAlign:'center'}}/>
                    <input type="number" step="1" value={row.karat} onChange={e=>updateBarRow(i,'karat',e.target.value)} onKeyDown={navField}
                      placeholder="مثال: 916"
                      style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(237,184,74,0.2)',
                        borderRadius:8,padding:'7px 8px',fontSize:13,fontWeight:900,fontFamily:'monospace',color:'#EDB84A',textAlign:'center'}}/>
                    <button onClick={()=>removeBarRow(i)}
                      style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:7,
                        color:'#EF4444',fontSize:14,cursor:'pointer',fontWeight:900,padding:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      ✕
                    </button>
                  </div>
                ))}
              </div>

              {/* ── الديون الافتتاحية ── */}
              <div style={{borderTop:'1px solid rgba(255,255,255,0.1)',paddingTop:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <button onClick={addDebtRow}
                    style={{padding:'5px 12px',background:'rgba(129,140,248,0.15)',border:'1px solid rgba(129,140,248,0.35)',
                      borderRadius:8,color:'#A5B4FC',fontWeight:800,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
                    + إضافة زبون
                  </button>
                  <span style={{fontSize:13,color:'rgba(255,255,255,0.5)',fontWeight:800}}>◎ الديون الافتتاحية</span>
                </div>
                {/* عناوين الأعمدة */}
                <div style={{display:'grid',gridTemplateColumns:'2fr 1.2fr 1.2fr 28px',gap:6,marginBottom:6}}>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',fontWeight:800,textAlign:'right'}}>اسم الزبون</div>
                  <div style={{fontSize:11,color:'rgba(237,184,74,0.5)',fontWeight:800,textAlign:'center'}}>دينار (دج)</div>
                  <div style={{fontSize:11,color:'rgba(52,211,153,0.5)',fontWeight:800,textAlign:'center'}}>ذهب (غ)</div>
                  <div/>
                </div>
                {opDebts.map((row,i)=>(
                  <div key={i} style={{display:'grid',gridTemplateColumns:'2fr 1.2fr 1.2fr 28px',gap:6,marginBottom:6}}>
                    <input type="text" value={row.name} onChange={e=>updateDebtRow(i,'name',e.target.value)} onKeyDown={navField}
                      placeholder="اسم الزبون..."
                      style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.15)',
                        borderRadius:8,padding:'7px 10px',fontSize:14,fontWeight:700,color:'#EDF1FF',fontFamily:'inherit',textAlign:'right'}}/>
                    <input type="number" value={row.dinar} onChange={e=>updateDebtRow(i,'dinar',e.target.value)} onKeyDown={navField}
                      placeholder="0"
                      style={{background:'rgba(255,255,255,0.07)',
                        border:`1px solid ${parseFloat(row.dinar)<0?'rgba(239,68,68,0.4)':'rgba(237,184,74,0.2)'}`,
                        borderRadius:8,padding:'7px 8px',fontSize:13,fontWeight:900,fontFamily:'monospace',
                        color:parseFloat(row.dinar)<0?'#EF4444':'#EDB84A',textAlign:'center'}}/>
                    <input type="number" step="0.001" value={row.gold} onChange={e=>updateDebtRow(i,'gold',e.target.value)} onKeyDown={navField}
                      placeholder="0.000"
                      style={{background:'rgba(255,255,255,0.07)',
                        border:`1px solid ${parseFloat(row.gold)<0?'rgba(239,68,68,0.4)':'rgba(52,211,153,0.2)'}`,
                        borderRadius:8,padding:'7px 8px',fontSize:13,fontWeight:900,fontFamily:'monospace',
                        color:parseFloat(row.gold)<0?'#EF4444':'#34D399',textAlign:'center'}}/>
                    <button onClick={()=>removeDebtRow(i)}
                      style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:7,
                        color:'#EF4444',fontSize:14,cursor:'pointer',fontWeight:900,padding:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      ✕
                    </button>
                  </div>
                ))}
              </div>

              {/* ── أزرار التأكيد ── */}
              <div style={{display:'flex',gap:8}}>
                <button onClick={submitOpening}
                  style={{flex:1,padding:'10px',background:'linear-gradient(135deg,#D4A030,#EDB84A)',border:'none',borderRadius:10,
                    color:'#1A0A00',fontWeight:900,fontSize:15,cursor:'pointer',fontFamily:'inherit',
                    display:'flex',alignItems:'center',justifyContent:'center',gap:6,
                    boxShadow:'0 4px 18px rgba(212,160,48,0.35)'}}>
                  <CheckIco size={13} color="#1A0A00"/> تأكيد وحفظ الأرصدة
                </button>
                <button onClick={()=>setOpeningOpen(false)}
                  style={{padding:'10px 14px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.15)',
                    borderRadius:10,color:'rgba(255,255,255,0.5)',fontWeight:800,fontSize:15,cursor:'pointer',fontFamily:'inherit'}}>
                  ✕
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── HERO BANNER ── */}
      <div style={{
        background:t.dark
          ?'linear-gradient(135deg,#07111F 0%,#0F1E36 55%,#0A1528 100%)'
          :'linear-gradient(135deg,#0F1D36 0%,#1A2D50 55%,#0F1D36 100%)',
        borderRadius:20,padding:'26px 32px',
        border:'1px solid rgba(212,160,48,0.28)',
        boxShadow:'0 10px 40px rgba(0,0,0,0.35)',
        position:'relative',overflow:'hidden',
        display:'grid',gridTemplateColumns:'1fr 1px 1fr',gap:0,alignItems:'center',
      }}>
        {/* Top gold line */}
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,transparent,#EDB84A,#D4A030,#EDB84A,transparent)'}}/>
        {/* Subtle glow */}
        <div style={{position:'absolute',top:'-40%',left:'50%',transform:'translateX(-50%)',width:300,height:200,
          background:'radial-gradient(ellipse,rgba(212,160,48,0.07) 0%,transparent 70%)',pointerEvents:'none'}}/>

        {/* صوارد الكوفر */}
        <div style={{textAlign:'center',padding:'6px 24px 6px 0'}}>
          <div style={{fontSize:11,color:'rgba(237,184,74,0.75)',fontWeight:800,letterSpacing:3,marginBottom:10,textTransform:'uppercase'}}>
            ◈ صوارد الكوفر
          </div>
          <div style={{fontSize:38,fontWeight:900,fontFamily:'monospace',color:'#EDB84A',lineHeight:1,
            textShadow:'0 0 30px rgba(237,184,74,0.4)'}}>
            {fmtInt(dinarCofferTotal)}
          </div>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.45)',marginTop:7,fontWeight:700,letterSpacing:1}}>دينار جزائري</div>
        </div>

        {/* Divider */}
        <div style={{width:1,alignSelf:'stretch',background:'linear-gradient(to bottom,transparent,rgba(212,160,48,0.35),transparent)'}}/>

        {/* باقي اللانقو */}
        <div style={{textAlign:'center',padding:'6px 0 6px 24px'}}>
          <div style={{fontSize:11,color:'rgba(52,211,153,0.8)',fontWeight:800,letterSpacing:3,marginBottom:10,textTransform:'uppercase'}}>
            ◈ باقي اللانقو
          </div>
          <div style={{fontSize:38,fontWeight:900,fontFamily:'monospace',color:'#34D399',lineHeight:1,
            textShadow:'0 0 30px rgba(52,211,153,0.35)'}}>
            {fmt(extraLingotBalance)}
          </div>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.45)',marginTop:7,fontWeight:700,letterSpacing:1}}>غرام ذهب خالص</div>
        </div>
      </div>

      {/* ── ACTION CARDS ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>

        {/* أخذ */}
        <div style={{
          background:t.cardBg,borderRadius:16,border:`1px solid ${t.border}`,
          boxShadow:t.shadow,padding:20,display:'flex',flexDirection:'column',justifyContent:'center',minHeight:190,
          transition:'all 0.2s',
        }}>
          {!takeActive?(
            <button onClick={()=>{setTakeActive(true);setGiveActive(false);setExpenseActive(false);}}
              style={{width:'100%',flex:1,background:'transparent',border:'none',cursor:'pointer',fontFamily:'inherit',
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,padding:'10px 0'}}>
              <div style={{width:58,height:58,borderRadius:16,background:'rgba(239,68,68,0.1)',
                border:'1.5px solid rgba(239,68,68,0.3)',display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 4px 16px rgba(239,68,68,0.15)'}}>
                <DownIco size={26} color="#EF4444"/>
              </div>
              <div style={{fontSize:20,fontWeight:900,color:'#EF4444',letterSpacing:1}}>أخذ</div>
              <div style={{fontSize:12,color:t.textMuted,fontWeight:700,textAlign:'center',lineHeight:1.4}}>تسليم للزبون</div>
            </button>
          ):mkForm('أخذ','أنا أعطيت للزبون','#EF4444','rgba(239,68,68,0.3)',
            <>
              <input style={inputStyle} type="text" list="rf-cn" placeholder="اسم الزبون..." value={takeCustomer} onChange={e=>setTakeCustomer(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitTake()}/><datalist id="rf-cn">{customerNames.map((n,i)=><option key={i} value={n}/>)}</datalist>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {qtyInput(takeType,takeQuantity,setTakeQuantity,submitTake,numStyle)}
                {typeToggle(takeType,setTakeType,'لانقو','دينار','linear-gradient(135deg,#EF4444,#BE1A38)')}
              </div>
              <input style={inputStyle} type="text" placeholder="ملاحظة (اختياري)..." value={takeNote} onChange={e=>setTakeNote(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitTake()}/>
            </>,
            submitTake,()=>setTakeActive(false),'تأكيد الأخذ'
          )}
        </div>

        {/* دفع */}
        <div style={{
          background:t.cardBg,borderRadius:16,border:`1px solid ${t.border}`,
          boxShadow:t.shadow,padding:20,display:'flex',flexDirection:'column',justifyContent:'center',minHeight:190,
        }}>
          {!giveActive?(
            <button onClick={()=>{setGiveActive(true);setTakeActive(false);setExpenseActive(false);}}
              style={{width:'100%',flex:1,background:'transparent',border:'none',cursor:'pointer',fontFamily:'inherit',
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,padding:'10px 0'}}>
              <div style={{width:58,height:58,borderRadius:16,background:'rgba(16,185,129,0.1)',
                border:'1.5px solid rgba(16,185,129,0.3)',display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 4px 16px rgba(16,185,129,0.15)'}}>
                <UpIco size={26} color="#10B981"/>
              </div>
              <div style={{fontSize:20,fontWeight:900,color:'#10B981',letterSpacing:1}}>دفع</div>
              <div style={{fontSize:12,color:t.textMuted,fontWeight:700,textAlign:'center',lineHeight:1.4}}>استلام من الزبون</div>
            </button>
          ):mkForm('دفع','الزبون أعطاني','#10B981','rgba(16,185,129,0.3)',
            <>
              <input style={inputStyle} type="text" list="rf-cn" placeholder="اسم الزبون..." value={giveCustomer} onChange={e=>setGiveCustomer(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitGive()}/><datalist id="rf-cn">{customerNames.map((n,i)=><option key={i} value={n}/>)}</datalist>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {qtyInput(giveType,giveQuantity,setGiveQuantity,submitGive,numStyle)}
                {typeToggle(giveType,setGiveType,'لانقو','دينار','linear-gradient(135deg,#10B981,#059669)')}
              </div>
              <input style={inputStyle} type="text" placeholder="ملاحظة (اختياري)..." value={giveNote} onChange={e=>setGiveNote(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitGive()}/>
            </>,
            submitGive,()=>setGiveActive(false),'تأكيد الدفع'
          )}
        </div>

        {/* مصاريف */}
        <div style={{
          background:t.cardBg,borderRadius:16,border:`1px solid ${t.border}`,
          boxShadow:t.shadow,padding:20,display:'flex',flexDirection:'column',justifyContent:'center',minHeight:190,
        }}>
          {!expenseActive?(
            <button onClick={()=>{setExpenseActive(true);setTakeActive(false);setGiveActive(false);}}
              style={{width:'100%',flex:1,background:'transparent',border:'none',cursor:'pointer',fontFamily:'inherit',
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,padding:'10px 0'}}>
              <div style={{width:58,height:58,borderRadius:16,
                background:'linear-gradient(135deg,rgba(212,160,48,0.12),rgba(237,184,74,0.08))',
                border:'1.5px solid rgba(212,160,48,0.35)',display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 4px 16px rgba(212,160,48,0.2)'}}>
                <BagIco size={26} color={t.goldSolid}/>
              </div>
              <div style={{fontSize:20,fontWeight:900,color:t.goldSolid,letterSpacing:1}}>مصاريف</div>
              <div style={{fontSize:12,color:t.textMuted,fontWeight:700,textAlign:'center',lineHeight:1.4}}>صرف من الكوفر</div>
            </button>
          ):mkForm('مصاريف','صرف من الكوفر',t.goldSolid,'rgba(212,160,48,0.3)',
            <>
              <input style={inputStyle} type="text" placeholder="مثال: شراء غاز، كراء..." value={expenseDesc} onChange={e=>setExpenseDesc(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitExpense()}/>
              <input style={numStyle} type="text" inputMode="numeric" placeholder="0" value={expenseAmount?fmtInt(expenseAmount):''} onChange={e=>setExpenseAmount(e.target.value.replace(/[^\d]/g,''))} onKeyDown={e=>e.key==='Enter'&&submitExpense()}/>
            </>,
            submitExpense,()=>setExpenseActive(false),'تأكيد الصرف'
          )}
        </div>

      </div>

      {/* ── RECENT ACTIVITIES ── */}
      {recentActivities.length>0&&(
        <div style={{background:t.cardBg,borderRadius:16,border:`1px solid ${t.border}`,boxShadow:t.shadow,overflow:'hidden'}}>
          <div style={{padding:'13px 18px',borderBottom:`1px solid ${t.border}`,
            display:'flex',alignItems:'center',justifyContent:'space-between',
            background:t.theadBg}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:G,boxShadow:'0 0 8px rgba(212,160,48,0.6)'}}/>
              <span style={{fontWeight:900,fontSize:15,color:t.textPrimary}}>آخر المعاملات</span>
            </div>
            <span style={{fontSize:12,color:t.textMuted,fontWeight:700}}>{recentActivities.length} عملية</span>
          </div>
          <div>
            {recentActivities.slice(0,5).map((act,i)=>{
              const c=actCfg[act.type]||{color:t.textSec,label:'عام'};
              const isCash=act.type==='take'||act.type==='give'||act.type==='expense';
              return (
                <div key={i} style={{
                  display:'flex',alignItems:'center',gap:12,padding:'11px 18px',
                  borderBottom:i<Math.min(recentActivities.length,5)-1?`1px solid ${t.borderLight}`:'none',
                  background:i%2===0?'transparent':t.theadBg+'55',
                }}>
                  <div style={{width:34,height:34,borderRadius:10,flexShrink:0,
                    background:`${c.color}15`,border:`1px solid ${c.color}30`,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:16,color:c.color,fontWeight:900}}>
                    {act.type==='take'||act.type==='take-gold'?'↑':act.type==='رافيناج'?'✦':'↓'}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:800,color:t.textPrimary,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{act.desc}</div>
                    <div style={{fontSize:12,color:t.textMuted,marginTop:2}}>{act.date}</div>
                  </div>
                  <div style={{textAlign:'center',flexShrink:0}}>
                    <div style={{fontFamily:'monospace',fontWeight:900,fontSize:15,color:c.color}}>
                      {isCash?fmtInt(act.amount)+' دج':fmt(act.amount)+' غ'}
                    </div>
                    <div style={{fontSize:11,color:t.textMuted,fontWeight:700,marginTop:1}}>{c.label}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

    </div>
  );
}

/* ═══════════════════════════════════════════════
   TRANSFER MODAL
═══════════════════════════════════════════════ */
function TransferModal({t,isOpen,selectedCount,onClose,onConfirmTransfer}){
  if(!isOpen) return null;
  const overlay={position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',backdropFilter:'blur(4px)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:16};
  return (
    <div style={overlay} dir="rtl">
      <div style={{background:t.cardBg,borderRadius:20,maxWidth:420,width:'100%',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,0.3)',border:`1px solid ${t.border}`}}>
        <div style={{padding:'14px 18px',background:t.theadBg,borderBottom:`1px solid ${t.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <HammerIco size={17} color={t.goldAccent}/>
            <span style={{fontWeight:900,fontSize:18,color:t.textPrimary}}>تحويل الذهب الصافي للورشات</span>
          </div>
          <button onClick={onClose} style={{background:'transparent',border:'none',cursor:'pointer',color:t.textSec,display:'flex'}}><XIco size={18} color={t.textSec}/></button>
        </div>
        <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
          <p style={{color:t.textSec,fontWeight:700,fontSize:17,lineHeight:1.6}}>
            قمت بتحديد <span style={{color:t.goldSolid,fontWeight:900}}>{selectedCount}</span> سبيكة.
            اختر الورشة لتحويل الذهب وبدء التصنيع:
          </p>
          <div style={{display:'grid',gridTemplateColumns:'1fr',gap:10}}>
            {[
              {key:'workshop1',label:'rahim',color:'#0EA5E9'},
            ].map(w=>(
              <button key={w.key} onClick={()=>onConfirmTransfer(w.key)}
                style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,padding:18,borderRadius:14,background:`${w.color}12`,border:`1px solid ${w.color}30`,color:w.color,fontWeight:900,fontSize:17,cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s'}}>
                <HammerIco size={22} color={w.color}/>
                <span>{w.label}</span>
              </button>
            ))}
          </div>
          <button onClick={onClose} style={{padding:'10px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:10,color:t.textSec,fontWeight:800,fontSize:16,cursor:'pointer',fontFamily:'inherit'}}>
            إلغاء وتجميع السبائك لاحقاً
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   COFFER TAB
═══════════════════════════════════════════════ */
function CofferTab({t,lingots,onOpenTransferModal,onLoanLingot,onAddBar,onEditBar,onDeleteBar,customerNames=[]}){
  /* التحديد يعتمد على معرّف السبيكة (id) لا على الفهرس — حتى لا تتغيّر الإشارة عند تعديل القائمة */
  const [selectedIds,setSelectedIds]=useState([]);
  const [searchTerm,setSearchTerm]=useState('');
  const [loanLingot,setLoanLingot]=useState(null);
  const [loanName,setLoanName]=useState('');
  const [barModal,setBarModal]=useState(null);   // {id?, weight, karat, source}
  const submitBarModal=()=>{
    const w=parseFloat(barModal.weight)||0, k=parseFloat(barModal.karat)||0;
    if(w<=0||k<=0){alert('⚠️ أدخل ميزاناً وعياراً صحيحين.');return;}
    if(barModal.id) onEditBar(barModal.id,w,k);
    else onAddBar(w,k,(barModal.source||'').trim()||'رصيد افتتاحي');
    setBarModal(null);
  };

  const totalWeight=lingots.filter(l=>l.weight>0).reduce((s,l)=>s+(l.weight*l.karat)/1000,0);
  const physicalCount=lingots.filter(l=>l.weight>0).length;

  const filtered=lingots.filter(l=>l.weight>0)
    .filter((lingot)=>{
      const term=searchTerm.toLowerCase().trim();
      if(!term) return true;
      return lingot.weight.toString().includes(term)||lingot.source.toLowerCase().includes(term)||lingot.id.toLowerCase().includes(term);
    });

  const isAllSelected=filtered.length>0&&filtered.every(l=>selectedIds.includes(l.id));
  const toggleRow=(id)=>setSelectedIds(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);

  const handleTransferClick=()=>{
    if(selectedIds.length===0){alert('⚠️ الرجاء تحديد سبيكة واحدة على الأقل.');return;}
    onOpenTransferModal(selectedIds);setSelectedIds([]);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <Card t={t} style={{padding:'18px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:28}}>
          <div>
            <div style={{fontSize:14,color:t.textSec,fontWeight:700,marginBottom:5}}>مجموع الـ 24 الصافي</div>
            <div style={{fontSize:26,fontWeight:900,fontFamily:'monospace',background:t.goldGrad,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
              {fmt(totalWeight)} <span style={{fontSize:17}}>غرام</span>
            </div>
          </div>
          <div style={{width:1,height:40,background:t.border}}/>
          <div>
            <div style={{fontSize:14,color:t.textSec,fontWeight:700,marginBottom:5}}>عدد السبائك</div>
            <div style={{fontSize:26,fontWeight:900,fontFamily:'monospace',color:t.green}}>
              {physicalCount} <span style={{fontSize:17,color:t.textMuted}}>سبيكة</span>
            </div>
          </div>
        </div>
        <button onClick={handleTransferClick} style={{padding:'11px 22px',background:`linear-gradient(135deg,${t.goldAccent},#E8B84B)`,border:'none',borderRadius:11,color:'#3A1F00',fontWeight:900,fontSize:17,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:8}}>
          <ShareIco size={16} color="#3A1F00"/> تحويل للورشات ({selectedIds.length})
        </button>
      </Card>

      <Card t={t} style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
        <div style={{position:'relative',flex:1}}>
          <input type="text" placeholder="ابحث بالوزن أو اسم الزبون..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
            style={{width:'100%',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'8px 36px 8px 12px',fontSize:16,fontWeight:700,color:t.textPrimary,fontFamily:'inherit',textAlign:'right'}}/>
          <SearchIco size={14} color={t.textMuted} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)'}}/>
        </div>
        <button onClick={()=>setBarModal({weight:'',karat:'',source:'رصيد افتتاحي'})}
          style={{padding:'8px 14px',background:`${t.goldAccent}18`,border:`1px solid ${t.goldAccent}55`,borderRadius:9,fontSize:14,fontWeight:800,color:t.goldSolid,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
          + إضافة سبيكة
        </button>
        {filtered.length>0&&(
          <button onClick={()=>setSelectedIds(isAllSelected?[]:filtered.map(l=>l.id))}
            style={{padding:'8px 14px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,fontSize:14,fontWeight:800,color:t.textSec,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>
            {isAllSelected?<SqIco size={14} color={t.textSec}/>:<CkbxIco size={14} color={t.textSec}/>}
            {isAllSelected?'إلغاء الكل':'تحديد الكل'}
          </button>
        )}
      </Card>

      <Card t={t} style={{overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <Thead t={t} cols={['اختيار','الوزن','العيار','الصافي 24k','المصدر','إجراءات']}/>
          <tbody>
            {filtered.map((lingot)=>{
              const isSelected=selectedIds.includes(lingot.id);
              return (
                <tr key={lingot.id} onClick={()=>toggleRow(lingot.id)}
                  style={{cursor:'pointer',background:isSelected?`${t.goldAccent}08`:t.cardBg,borderBottom:`1px solid ${t.borderLight}`,transition:'background 0.12s'}}>
                  <td style={{padding:'12px',textAlign:'center'}}>
                    <button onClick={e=>{e.stopPropagation();toggleRow(lingot.id);}}
                      style={{padding:'4px 10px',borderRadius:7,border:`1px solid ${isSelected?t.goldAccent:t.border}`,background:isSelected?`${t.goldAccent}20`:'transparent',color:isSelected?t.goldSolid:t.textSec,fontWeight:800,fontSize:14,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:5,margin:'0 auto'}}>
                      {isSelected?<CkbxIco size={12} color={t.goldSolid}/>:<SqIco size={12} color={t.textSec}/>}
                      {isSelected?'محدد':'اختيار'}
                    </button>
                  </td>
                  <td style={{padding:'12px 14px',textAlign:'center',fontFamily:'monospace',fontWeight:900,color:t.textPrimary,fontSize:17}}>{fmt(lingot.weight)}</td>
                  <td style={{padding:'12px 14px',textAlign:'center',fontFamily:'monospace',fontWeight:800,color:t.goldSolid,fontSize:17}}>{lingot.karat}</td>
                  <td style={{padding:'12px 14px',textAlign:'center',fontFamily:'monospace',fontWeight:900,color:t.green,fontSize:17}}>{fmt((lingot.weight*lingot.karat)/1000)}</td>
                  <td style={{padding:'12px 14px',textAlign:'center',fontSize:16,color:t.textSec,fontWeight:700}}>
                    <div>{lingot.source}</div>
                    {(()=>{ const m=String(lingot.id||'').match(/^L-(.+)-\d+$/); return m?<div style={{fontSize:11,color:t.textMuted,fontWeight:600,marginTop:2}}>فاتورة #{m[1]}</div>:null; })()}
                  </td>
                  <td style={{padding:'12px',textAlign:'center'}}>
                    <div style={{display:'flex',gap:6,justifyContent:'center',alignItems:'center'}}>
                      <button onClick={e=>{e.stopPropagation();setLoanName('');setLoanLingot(lingot);}}
                        style={{padding:'5px 13px',borderRadius:7,border:`1px solid ${(t.blue||'#3B82F6')}50`,background:`${(t.blue||'#3B82F6')}18`,color:t.blue||'#3B82F6',fontWeight:800,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
                        سلف
                      </button>
                      <button onClick={e=>{e.stopPropagation();setBarModal({id:lingot.id,weight:String(lingot.weight),karat:String(lingot.karat),source:lingot.source||''});}}
                        title="تعديل"
                        style={{padding:'5px 9px',borderRadius:7,border:`1px solid ${t.border}`,background:t.inputBg,color:t.textSec,fontWeight:800,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
                        ✎
                      </button>
                      <button onClick={e=>{e.stopPropagation(); if(confirm(`حذف السبيكة (${fmt(lingot.weight)}غ / ${lingot.karat})؟`)) onDeleteBar(lingot.id);}}
                        title="حذف"
                        style={{padding:'5px 9px',borderRadius:7,border:'1px solid rgba(239,68,68,0.35)',background:'rgba(239,68,68,0.12)',color:'#EF4444',fontWeight:900,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
                        ✕
                      </button>
                    </div>
                  </td>
                </tr>
              );
            })}
            {filtered.length===0&&<tr><td colSpan={6} style={{padding:28,textAlign:'center',color:t.textMuted,fontWeight:700,fontSize:17}}>{searchTerm?'لم يتم العثور على نتائج':'لا توجد سبائك مسجلة حالياً'}</td></tr>}
          </tbody>
        </table>
      </Card>

      {barModal && (
        <div onClick={()=>setBarModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div onClick={e=>e.stopPropagation()} dir="rtl" style={{width:'100%',maxWidth:400,background:t.cardBg,border:`1px solid ${t.border}`,borderRadius:16,padding:20,fontFamily:"'Tajawal',system-ui,sans-serif",color:t.textPrimary,boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
            <div style={{fontSize:18,fontWeight:900,color:t.goldSolid,marginBottom:14}}>{barModal.id?'تعديل سبيكة':'إضافة سبيكة للكوفر'}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:12,fontWeight:800,color:t.textSec,marginBottom:5}}>الميزان (غ)</div>
                <input type="number" step="0.001" value={barModal.weight} onChange={e=>setBarModal(m=>({...m,weight:e.target.value}))} placeholder="0.000"
                  style={{width:'100%',boxSizing:'border-box',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'9px 10px',fontSize:16,fontWeight:900,fontFamily:'monospace',color:t.textPrimary,textAlign:'center'}}/>
              </div>
              <div>
                <div style={{fontSize:12,fontWeight:800,color:t.textSec,marginBottom:5}}>العيار</div>
                <input type="number" step="1" value={barModal.karat} onChange={e=>setBarModal(m=>({...m,karat:e.target.value}))} placeholder="مثال: 916"
                  style={{width:'100%',boxSizing:'border-box',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'9px 10px',fontSize:16,fontWeight:900,fontFamily:'monospace',color:t.goldSolid,textAlign:'center'}}/>
              </div>
            </div>
            {!barModal.id && (
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:800,color:t.textSec,marginBottom:5}}>المصدر</div>
                <input type="text" value={barModal.source} onChange={e=>setBarModal(m=>({...m,source:e.target.value}))} placeholder="رصيد افتتاحي"
                  style={{width:'100%',boxSizing:'border-box',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'9px 10px',fontSize:15,fontWeight:700,color:t.textPrimary,fontFamily:'inherit',textAlign:'right'}}/>
              </div>
            )}
            <div style={{display:'flex',gap:8}}>
              <button onClick={submitBarModal} style={{flex:1,padding:'11px',borderRadius:10,border:'none',background:t.goldSolid,color:'#1a1200',fontWeight:900,fontSize:15,cursor:'pointer',fontFamily:'inherit'}}>{barModal.id?'حفظ التعديل':'إضافة'}</button>
              <button onClick={()=>setBarModal(null)} style={{padding:'11px 18px',borderRadius:10,border:`1px solid ${t.border}`,background:t.inputBg,color:t.textSec,fontWeight:800,fontSize:15,cursor:'pointer',fontFamily:'inherit'}}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {loanLingot && (()=>{ const kh=(loanLingot.weight*loanLingot.karat)/1000; return (
        <div onClick={()=>setLoanLingot(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div onClick={e=>e.stopPropagation()} dir="rtl" style={{width:'100%',maxWidth:420,background:t.cardBg,border:`1px solid ${t.border}`,borderRadius:16,padding:20,fontFamily:"'Tajawal',system-ui,sans-serif",color:t.textPrimary,boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
            <div style={{fontSize:18,fontWeight:900,color:t.goldSolid,marginBottom:12}}>سلف سبيكة</div>
            <div style={{background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:10,padding:'10px 12px',marginBottom:12,fontSize:15,fontWeight:700,lineHeight:1.7}}>
              <div>الوزن: <b style={{fontFamily:'monospace'}}>{fmt(loanLingot.weight)}</b> غ — العيار: <b style={{fontFamily:'monospace'}}>{loanLingot.karat}</b></div>
              <div>يُسجَّل على الزبون: <b style={{fontFamily:'monospace',color:t.green}}>{fmt(kh)} غ</b> صافي 24</div>
            </div>
            <div style={{fontSize:13,fontWeight:800,color:t.textSec,marginBottom:4}}>اسم الزبون</div>
            <input type="text" list="rf-cn-loan" value={loanName} onChange={e=>setLoanName(e.target.value)} placeholder="اسم الزبون..."
              style={{width:'100%',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,padding:'9px 12px',fontSize:16,fontWeight:700,color:t.textPrimary,fontFamily:'inherit',textAlign:'right',marginBottom:14,boxSizing:'border-box'}}/>
            <datalist id="rf-cn-loan">{customerNames.map((n,i)=><option key={i} value={n}/>)}</datalist>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{ if(!loanName.trim()){alert('⚠️ أدخل اسم الزبون.');return;} onLoanLingot&&onLoanLingot(loanLingot.id,loanName.trim()); setLoanLingot(null); }}
                style={{flex:1,padding:'11px',background:'linear-gradient(135deg,#C8920A,#EDB84A)',border:'none',borderRadius:10,color:'#1A0A00',fontWeight:900,fontSize:16,cursor:'pointer',fontFamily:'inherit'}}>تأكيد السلف</button>
              <button onClick={()=>setLoanLingot(null)} style={{padding:'11px 16px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:10,color:t.textSec,fontWeight:800,fontSize:16,cursor:'pointer',fontFamily:'inherit'}}>إلغاء</button>
            </div>
          </div>
        </div> ); })()}
    </div>
  );
}

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid #eee'}}>
      <span style={{fontSize:16,color:'#555',fontWeight:700}}>{lbl}</span>

          </div>
          <button onClick={onClose} style={{background:'transparent',border:'none',cursor:'pointer',display:'flex'}}><XIco size={18} color={t.textSec}/></button>
        </div>

        {/* White paper invoice */}
        <div ref={modalRef} style={{background:'white',color:'#111',margin:'12px 12px 0',borderRadius:12,padding:'20px 22px',fontFamily:'Tahoma,Arial,sans-serif',direction:'rtl',boxShadow:'0 2px 8px rgba(0,0,0,0.08)'}}>
          {/* Invoice title */}
          <div style={{textAlign:'center',marginBottom:14,paddingBottom:10,borderBottom:'2px solid #C0390F'}}>

            <thead>
              <tr style={{background:'#1a1a1a',color:'white'}}>
                {['#','الوزن (غ)','العيار','الخالص (غ)'].map(h=>(
                  <th key={h} style={{padding:'8px',textAlign:'center',fontSize:16}}>{h}</th>
                ))}

            </thead>
            <tbody>
              {invoice.items.map((it,i)=>(
                <tr key={i} style={{background:i%2===0?'#fff':'#f9f9f9',borderBottom:'1px solid #eee'}}>
                  <td style={{padding:'6px 8px',textAlign:'center',color:'#888',fontSize:16}}>{i+1}</td>

        </div>

        {/* Action buttons */}
        <div style={{padding:'10px 12px 12px',display:'flex',gap:8}}>
          <button onClick={()=>generateInvoicePDF(invoice)}
            style={{flex:1,padding:'9px',background:'#C0390F',border:'none',borderRadius:9,color:'white',fontWeight:900,fontSize:16,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            📥 تحميل PDF
          </button>
          <button onClick={onClose}
            style={{padding:'9px 14px',background:t.inputBg,border:`1px solid ${t.border}`,borderRadius:9,color:t.textSec,fontWeight:800,fontSize:16,cursor:'pointer',fontFamily:'inherit'}}>
            ✕

        </div>
      </div>
    </div>
  );
}

/* ── PDF INVOICE TEMPLATE ── */
function generateInvoicePDF(data){
  const invoiceId=data.id||data.invoiceId;
  const customer=data.customer||'زبون عام';
  const deliverer=data.deliverer||'';
  const items=(data.items||[]).filter(it=>(it.weight||0)>0&&(it.karat||0)>0);
  const price=data.price||0;
  const fee=data.fee||0;
  const prevDinar=data.prevDinar||0;
  const prevGold=data.prevGold||0;
  const thisPayment=data.thisPayment||0;
  const lingotPayment=data.lingotPayment||0;
  const date=data.date||getTodayDateString();
  const totalRaw=items.reduce((s,it)=>s+(it.weight||0),0);
  const totalKhalas=items.reduce((s,it)=>s+(it.khalas||0),0);
  const remDinar=data.remaining!==undefined?data.remaining:(data.remainingDinar!==undefined?data.remainingDinar:prevDinar-price+thisPayment);
  const remGold=data.remainingGold!==undefined?data.remainingGold:(totalKhalas+prevGold-lingotPayment);

  const rows=items.map((it,i)=>`
    <tr style="background:${i%2===0?'#ffffff':'#f9f9f9'};">
      <td style="padding:7px 10px;text-align:center;color:#666;font-size:13px;border-bottom:1px solid #ebebeb;">${i+1}</td>
      <td style="padding:7px 10px;text-align:center;font-family:monospace;font-size:13px;border-bottom:1px solid #ebebeb;">${fmt(it.weight)}</td>
      <td style="padding:7px 10px;text-align:center;font-family:monospace;font-size:13px;border-bottom:1px solid #ebebeb;">${it.karat}</td>
      <td style="padding:7px 10px;text-align:center;font-family:monospace;font-weight:700;font-size:13px;border-bottom:1px solid #ebebeb;">${fmt(it.khalas)}</td>
    </tr>`).join('');

  const srow=(lbl,val)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;"><span style="font-size:12px;color:#555;font-weight:700;">${lbl}</span><span style="font-family:monospace;font-size:13px;">${val}</span></div>`;

  const html=`<div style="direction:rtl;font-family:Tahoma,Arial,sans-serif;background:white;padding:32px 36px;width:660px;color:#111;box-sizing:border-box;">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="font-size:26px;font-weight:900;color:#C0390F;">&#x1F525; فاتورة رافيناج</div>
      <div style="font-size:13px;color:#777;margin-top:6px;">${customer} – ${date}</div>
      ${deliverer?`<div style="font-size:12px;color:#999;margin-top:2px;">المسلِّم: ${deliverer}</div>`:''}
    </div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:20px;border:1px solid #ccc;">
      <thead><tr style="background:#1a1a1a;color:white;">
        <th style="padding:10px;text-align:center;font-size:13px;">#</th>
        <th style="padding:10px;text-align:center;font-size:13px;">الوزن&nbsp;(غ)</th>
        <th style="padding:10px;text-align:center;font-size:13px;">العيار</th>
        <th style="padding:10px;text-align:center;font-size:13px;">الخالص&nbsp;(غ)</th>
      </tr></thead>
      <tbody>${rows}
        <tr style="background:#e5e5e5;font-weight:900;">
          <td style="padding:8px 10px;text-align:center;font-size:14px;">المجموع</td>
          <td style="padding:8px 10px;text-align:center;font-family:monospace;font-size:14px;">${fmt(totalRaw)}</td>
          <td style="padding:8px 10px;text-align:center;font-size:14px;">–</td>
          <td style="padding:8px 10px;text-align:center;font-family:monospace;font-size:14px;">${fmt(totalKhalas)}</td>
        </tr>
      </tbody>
    </table>
    <div style="border:1px solid #ddd;border-radius:6px;padding:12px 16px;margin-bottom:14px;">
      ${srow('الأجرة/دج:(غ)',fee)}
      ${srow('قيمة:دج',fmtInt(price)+' دج')}
      ${srow('رصيد دينار:سابق',(prevDinar<0?'-':'')+fmtInt(Math.abs(prevDinar))+' دج')}
      ${srow('رصيد ذهب:سابق',(prevGold<0?'-':'')+fmt(Math.abs(prevGold))+' غ')}
    </div>
    <div style="border:2px solid #1a1a1a;border-radius:6px;padding:12px 16px;margin-bottom:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;">
        <span style="font-weight:900;font-size:15px;">النهائي:دينار</span>
        <span style="font-family:monospace;font-weight:900;font-size:20px;color:${remDinar<0?'#C0390F':'#111'};">${remDinar<0?'-':''}${fmtInt(Math.abs(remDinar))} دج</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;">
        <span style="font-weight:900;font-size:15px;">النهائي ذهب:24</span>
        <span style="font-family:monospace;font-weight:900;font-size:20px;color:${remGold<0?'#C0390F':'#111'};">${remGold<0?'-':''}${fmt(Math.abs(remGold))} غ</span>
      </div>
    </div>
    <div style="text-align:center;border-top:1px solid #ccc;padding-top:10px;color:#aaa;font-size:12px;">توقيع _______________</div>
  </div>`;

  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;top:-99999px;left:-99999px;z-index:-999;';
  wrap.innerHTML=html;
  document.body.appendChild(wrap);
  html2pdf().set({
    margin:[6,6,6,6],
    filename:`رافيناج-${String(invoiceId).padStart(3,'0')}.pdf`,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,logging:false},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(wrap.firstChild).save().then(()=>document.body.removeChild(wrap));
}

/* ── PDF ورشة ── */

function SingleInvoiceForm({t,onSaveInvoice,debtsList,invoiceId,prefix,extraLingotBalance,customerNames=[]}){
  const formRef=useRef(null);
  const [customer,setCustomer]=useState('');
  const [deliverer,setDeliverer]=useState('');
  const [status,setStatus]=useState('خالص');
  const calcRows=()=>Math.max(12,Math.floor((window.innerHeight-390)/36));
  const [items,setItems]=useState(()=>Array.from({length:calcRows()},()=>({weight:0,karat:0,khalas:0})));
  /* سطر تلقائي: إن امتلأ آخر سطر أُضيف سطر فارغ جديد */
  useEffect(()=>{
    const last=items[items.length-1];
    if(last && ((parseFloat(last.weight)||0)>0 || (parseFloat(last.karat)||0)>0)){
      setItems(p=>[...p,{weight:0,karat:0,khalas:0}]);
    }
  },[items]);
  const [fee,setFee]=useState(0);
  const [price,setPrice]=useState(0);
  const [prevDinar,setPrevDinar]=useState(0);
  const [prevGold,setPrevGold]=useState(0);
  const [thisPayment,setThisPayment]=useState(0);
  const [lingotPayment,setLingotPayment]=useState(0);

  useEffect(()=>{
    if(!customer){setPrevDinar(0);setPrevGold(0);return;}
    const m=debtsList.find(d=>d.name.trim().toLowerCase()===customer.trim().toLowerCase());
    if(m){setPrevDinar(m.amount);setPrevGold(parseFloat((m.gold||0).toFixed(2)));}
    else{setPrevDinar(0);setPrevGold(0);}
  },[customer,debtsList]);

  const handleItemChange=(index,field,value)=>{
    setItems(prev=>{
      const next=[...prev];
      const item={...next[index]};
      if(field==='weight') item.weight=parseFloat(value)||0;
      if(field==='karat') item.karat=parseFloat(value)||0;
      item.khalas=Number(((item.weight*item.karat)/1000).toFixed(4));
      next[index]=item;
      if(index===next.length-1&&(item.weight>0||item.karat>0)){
        next.push({weight:0,karat:0,khalas:0});
      }
      return next;
    });
  };

  const handleKeyDown=(e,index,field)=>{
    const fo=(id)=>{const el=document.getElementById(id);if(el){el.focus();el.select();}};
    if(e.key==='ArrowDown'){e.preventDefault();fo(`${prefix}-${field}-${index+1}`);}
    else if(e.key==='ArrowUp'&&index>0){e.preventDefault();fo(`${prefix}-${field}-${index-1}`);}
    else if(e.key==='ArrowLeft'&&field==='weight'){e.preventDefault();fo(`${prefix}-karat-${index}`);}
    else if(e.key==='ArrowLeft'&&field==='karat'){e.preventDefault();fo(`${prefix}-weight-${index+1}`);}
    else if(e.key==='ArrowRight'&&field==='karat'){e.preventDefault();fo(`${prefix}-weight-${index}`);}
    else if(e.key==='ArrowRight'&&field==='weight'&&index>0){e.preventDefault();fo(`${prefix}-karat-${index-1}`);}
  };

  const totalNetWeight=items.reduce((s,it)=>s+(it.khalas||0),0);
  const totalRawWeight=items.reduce((s,it)=>s+(it.weight||0),0);
  /* زبائن تُحسب أجرتهم على ميزان الـ24 (الصافي) بدل الخام */
  const NET_FEE_CUSTOMERS=[];
  const NO_FEE_CUSTOMERS=[];
  const _custKey=(customer||'').trim().replace(/\s+/g,' ');
  const feeOnNet=NET_FEE_CUSTOMERS.includes(_custKey);
  const noFee=NO_FEE_CUSTOMERS.includes(_custKey);
  const feeBaseWeight=feeOnNet?totalNetWeight:totalRawWeight;
  useEffect(()=>{setPrice(noFee?0:Number((feeBaseWeight*fee).toFixed(2)));},[feeBaseWeight,fee,noFee]);

  const remainingDinar=prevDinar-price+thisPayment;
  const remainingGold=totalNetWeight+prevGold-lingotPayment;

  const handleClearForm=()=>{
    setCustomer('');setDeliverer('');setStatus('خالص');
    setItems(Array.from({length:calcRows()},()=>({weight:0,karat:0,khalas:0})));
    setFee(0);setPrevDinar(0);setPrevGold(0);setThisPayment(0);setLingotPayment(0);
  };

  const handleSubmit=()=>{
    if(!customer.trim()){alert('⚠️ الرجاء إدخال اسم الزبون.');return;}
    if(!fee||fee<=0){alert('⚠️ الرجاء إدخال الأجرة.');return;}
    const activeItems=items.filter(it=>it.weight>0&&it.karat>0);
    if(activeItems.length===0){alert('⚠️ الرجاء إدخال وزن وعيار سبيكة واحدة على الأقل.');return;}
    if(lingotPayment>0&&lingotPayment>(extraLingotBalance||0)){
      alert(`⚠️ دفع اللانقو (${fmt(lingotPayment)} غ) يتجاوز باقي اللانقو المتاح (${fmt(extraLingotBalance||0)} غ).`);return;
    }
    generateInvoicePDF({invoiceId,customer:customer.trim(),deliverer:deliverer.trim(),items:activeItems,price,fee,prevDinar,prevGold,thisPayment,lingotPayment,status,remainingDinar,remainingGold});
    onSaveInvoice({invoiceId,customer:customer.trim(),deliverer:deliverer.trim(),items:activeItems,price,fee,prevDinar,prevGold,thisPayment,lingotPayment,status});
    handleClearForm();
  };

  const D=`1px solid ${t.border}`;
  const C=(p,extra={})=>({padding:p,textAlign:'center',...extra});
  const L=(text,color)=><div style={{fontSize:11,color:color||t.textMuted,fontWeight:800,marginBottom:1}}>{text}</div>;
  const N=(val,set,opts={})=>(
    opts.group ? (
      <input type="text" inputMode="numeric" value={(val||val===0)&&val!==''?fmtInt(val):''} placeholder="0"
        onChange={e=>{const raw=e.target.value.replace(/[^\d]/g,'');set(raw?parseInt(raw,10):0);}}
        style={{width:'88%',textAlign:'center',background:'transparent',border:'none',
          fontWeight:900,fontFamily:'monospace',fontSize:15,color:opts.color||t.textPrimary}}/>
    ) : (
      <input type="number" step={opts.step||'any'} value={val||''} placeholder="0"
        onChange={e=>set(parseFloat(e.target.value)||0)}
        style={{width:'88%',textAlign:'center',background:'transparent',border:'none',
          fontWeight:900,fontFamily:'monospace',fontSize:15,color:opts.color||t.textPrimary}}/>
    )
  );

  return (
    <div ref={formRef} style={{display:'flex',flexDirection:'column',gap:7,flex:1,minWidth:0,height:'100%',minHeight:0}}>

      {/* STATUS */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        {[{val:'خالص',color:t.green,Ico:ShieldIco},{val:'غير خالص',color:t.red,Ico:AlertIco}].map(s=>(
          <button key={s.val} onClick={()=>setStatus(s.val)}
            style={{padding:'8px 6px',borderRadius:10,border:`2px solid ${status===s.val?s.color:t.border}`,
              background:status===s.val?`${s.color}15`:t.cardBg,color:status===s.val?s.color:t.textSec,
              fontWeight:900,fontSize:16,cursor:'pointer',fontFamily:'inherit',
              display:'flex',alignItems:'center',justifyContent:'center',gap:6,transition:'all 0.15s'}}>
            <s.Ico size={14} color={status===s.val?s.color:t.textSec}/>{s.val}
          </button>
        ))}
      </div>

      {/* HEADER */}
      <Card t={t} style={{padding:'7px 10px',display:'flex',alignItems:'center',gap:7}}>
        <div style={{background:'#C0390F',borderRadius:16,padding:'5px 11px',fontSize:14,color:'white',fontWeight:900,flexShrink:0}}>
          🔥 رافيناج
        </div>
        <div style={{background:t.dark?'#1B2640':'#0F1E35',borderRadius:10,padding:'4px 9px',
